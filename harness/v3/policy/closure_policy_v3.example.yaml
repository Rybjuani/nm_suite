# Fase 0A skeleton — no runtime authority.
#
# This is an EXAMPLE of closure_policy_v3.yaml. It is NOT consumed by any
# gate, CI, or runtime. The real closure_policy_v3.yaml is created in
# Fase 1B+ when the harness v3 policy_engine.py exists.
#
# This file MUST NOT:
#   - be symlinked or copied to closure_policy_v3.yaml
#   - be referenced by any CI workflow
#   - be used to close keys
#   - declare PASS global
#   - invoke V1/V2
#
# This file documents the intended shape of the policy. It separates
# policy (rules, required_properties) from measurement (thresholds,
# near_threshold margin, known_non_deterministic_surfaces) — the latter
# lives in measurement_config_v3.example.yaml.

schema_version: "3.1.0-EXAMPLE"
project: nm_suite
policy_version: "EXAMPLE-ONLY"
_status: "Fase 0A skeleton — no runtime authority"

# ─── Required properties for CLOSURE_ALLOWED ───────────────────────────────
# All must be true. The harness v3 (future) validates each one independently
# and refuses closure if any is false.

required_properties:
  - tests_pass                              # referencia CI artifact URL + run_id
  - anti_fraud_clean                        # 8 vectores CLEAN (cobertura inicial de vectores conocidos)
  - replay_full_regen_pass                  # recaptura + recomparación + cardinalidad exacta
  - evidence_byte_reproducible              # bundle_sha256 reproduce on re-read
  - determinism_pass                        # dos actuals, changed_ratio < 0.005
  - state_assertion_valid                   # capture_state_assertion matches surface_key
  - canonical_png_hash_in_record            # record incluye canonical_png_sha256
  - vp_build_sha256_in_allowlist            # vs visualparity.lock.json

# ─── Rules: state → action ────────────────────────────────────────────────
# Maps VisualParity SurfaceStatus → harness action + additional requirements.

rules:
  - state: NO_DIFF
    action: CLOSURE_ALLOWED
    requires: [tests_pass, anti_fraud_clean, replay_full_regen_pass,
               evidence_byte_reproducible, determinism_pass, state_assertion_valid,
               canonical_png_hash_in_record, vp_build_sha256_in_allowlist]

  - state: LOW_DIFF
    action: HUMAN_REVIEW_REQUIRED
    requires: []
    note: "LOW_DIFF never auto-closes. Requires HUMAN_REVIEWED_PASS individual."

  - state: SUSPICIOUS
    action: BLOCK
    requires: []
    note: "Signature of fraud. Never closes."

  - state: HIGH_DIFF
    action: BLOCK
    requires: []
    note: "If suspected false positive, path is MEASUREMENT_DISPUTE, not override."

  - state: MISSING_PAIR
    action: BLOCK
    requires: []

  - state: SIZE_MISMATCH
    action: BLOCK
    requires: []

  - state: NEAR_THRESHOLD
    action: HUMAN_REVIEW_REQUIRED
    requires: []

  - state: NON_DETERMINISTIC
    action: BLOCK
    requires: []

  - state: MEASUREMENT_DISPUTE_CANDIDATE
    action: HUMAN_REVIEW_REQUIRED
    requires: []
    note: "Recalibración versionada + regeneración de bundle. No override."

  - state: HUMAN_REVIEWED_PASS
    action: CLOSURE_ALLOWED
    requires: [reviewer, timestamp_utc, reason_text_min_50_chars,
               reviewer_screenshot_sha256, tests_pass, anti_fraud_clean,
               replay_full_regen_pass, evidence_byte_reproducible,
               determinism_pass, state_assertion_valid,
               canonical_png_hash_in_record, vp_build_sha256_in_allowlist]
    note: "Only path to close a LOW_DIFF or IRREDUCIBLE case."

  - state: HUMAN_REVIEWED_FAIL
    action: BLOCK
    requires: []

# ─── Replay policy ────────────────────────────────────────────────────────
# --no-regen does NOT exist in V3.1. Replay = recaptura + recomparación +
# cardinalidad exacta.

replay_policy:
  structural_replay:
    allowed_as: pre_check_only
    forbidden_for: closure
  full_regen_replay:
    required_for: closure
    cardinality: exact  # replayed_keys == expected_keys
    replayed_keys_zero_with_expected_positive: BLOCK
    forbidden_flags: ["--no-regen"]  # flag does not exist in V3.1

# ─── Duplicate-key policy ─────────────────────────────────────────────────
# Duplicate-key check is a parser invariant, not a separate lint.

duplicate_key_policy:
  action: BLOCK
  check: "len(set(surface_keys)) == len(surface_keys)"
  failure_reason: "duplicate_surface_key"
  as: parser_invariant

# ─── Family/scope enforcement ─────────────────────────────────────────────
# Gate verifies other keys in target_set before CLOSURE_ALLOWED.
# No --allow-family-partial-close; owner changes target_set explicitly.

family_scope_policy:
  require_target_set: true
  require_family: true
  block_if_family_member_failing: true
  block_reason: "family_member_still_failing"
  bypass_only_via: []  # no bypass

# ─── Doc keyword policy ───────────────────────────────────────────────────
# DECISIÓN-OWNER is forbidden in active docs.
# OWNER_EXCEPTION_ACTIVE is NOT a flag or bypass; it is a signed record
# (reason + reviewer + timestamp) and does NOT open alternative closure paths.

doc_keyword_policy:
  forbidden_keyword: "DECISIÓN-OWNER"
  required_keyword: "OWNER_EXCEPTION_ACTIVE"  # only as signed record, not flag
  scan_paths: ["docs/**/*.md", "docs/**/*.yaml"]
  exclude_paths: ["docs/_archive/**", "docs/VisualParity_V3_1/MIGRATION_A_PLUS.md"]
  action_on_violation: BLOCK_CI

# ─── Deprecated operations ────────────────────────────────────────────────
# These operations do NOT exist in V3.1.

deprecated_operations:
  - operation: "reopen_legacy_all"
    replacement: "individual --reopen --key --reason --reviewer"
    rationale: "No mass-reopen path in V3.1."
  - operation: "--no-regen"
    replacement: "does not exist in V3.1"
    rationale: "Replay = recaptura + recomparación + cardinalidad exacta."
  - operation: "layered_visual_compare with threshold overrides"
    replacement: "visualparity compare --profile strict (thresholds are constants)"
    rationale: "Comparator Command Lock: thresholds are not CLI-overridable."
  - operation: "OWNER_EXCEPTION_ACTIVE as flag"
    replacement: "OWNER_EXCEPTION_ACTIVE as signed record (reason + reviewer + timestamp)"
    rationale: "Does not open alternative closure paths. Does not override HIGH_DIFF or LOW_DIFF."
  - operation: "signature.sha256 as cryptographic signature"
    replacement: "integrity/checksums.json + bundle_sha256 + vp_build_sha256 + policy_sha256 + closure_decision_sha256"
    rationale: "No false signature. Separate hashes for separate concerns."

