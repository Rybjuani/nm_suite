# Fase 0A skeleton — no runtime authority.
#
# This is an EXAMPLE of measurement_config_v3.yaml. It is NOT consumed by
# any gate, CI, or runtime. The real measurement_config_v3.yaml is created
# in Fase 1B+ when the harness v3 policy_engine.py and VisualParity Core
# exist.
#
# This file separates MEASUREMENT parameters from POLICY (which lives in
# closure_policy_v3.example.yaml). V2 peca al poner datos de medición
# (known_non_deterministic_surfaces, state_ambiguous_pairs,
# near_threshold_policy.margin_fraction) en la política. V3.1 los separa:
# la política referencia mediciones, no las contiene.
#
# If measurement changes (new non-deterministic surface, new ambiguous
# pair, threshold recalibration), the policy does NOT go stale — only this
# file changes, versioned.

schema_version: "3.1.0-EXAMPLE"
project: nm_suite
config_version: "EXAMPLE-ONLY"
_status: "Fase 0A skeleton — no runtime authority"

# ─── Comparator thresholds ────────────────────────────────────────────────
# These are CONSTANTS of the VisualParity comparator (not CLI-overridable).
# They are calibrated against the corpus (see docs/VisualParity_V3_1/CORPUS.md).
# Changes require comparator version bump + re-validation of all closures.

comparator_thresholds:
  min_ssim: 0.92                    # EXAMPLE value; calibrate in Fase 1A
  max_changed_pixel_ratio: 0.08     # EXAMPLE value; calibrate in Fase 1A
  text_dense_max_changed_pixel_ratio: 0.10  # EXAMPLE value; calibrate in Fase 1A
  max_mean_abs_diff: 0.035          # EXAMPLE value; calibrate in Fase 1A

# ─── Near-threshold ───────────────────────────────────────────────────────
# Surfaces whose metrics are within this fraction of a closing threshold
# get the near_threshold flag in the bundle. Harness requires
# HUMAN_REVIEWED_PASS for near_threshold surfaces.

near_threshold:
  margin_fraction: 0.05

# ─── Determinism check ───────────────────────────────────────────────────
# Two actual captures of the same surface, no commit in between. If
# changed_ratio >= this threshold, surface is NON_DETERMINISTIC.

determinism:
  changed_ratio_threshold: 0.005

# ─── Known non-deterministic surfaces ─────────────────────────────────────
# These surfaces are blocked until capture pipeline is stabilized.
# This list is MEASUREMENT data (derived from running DeterminismCheck),
# not policy. If a new surface is non-deterministic, it is added here
# (versioned), not in closure_policy_v3.yaml.

known_non_deterministic_surfaces:
  - surface_key: "suite:actividades@light"
    reason: "capture instability"
  - surface_key: "suite:actividades@dark"
    reason: "capture instability"
  - surface_key: "suite:actividades-filtered@light"
    reason: "capture instability"
  - surface_key: "suite:actividades-filtered@dark"
    reason: "report hash volatility"
  - surface_key: "suite:actividades-marked-hice@light"
    reason: "capture instability"
  - surface_key: "suite:actividades-marked-hice@dark"
    reason: "capture instability"
  - surface_key: "suite:respiracion-paused@light"
    reason: "animated ring/counter variance"
  - surface_key: "suite:respiracion-paused@dark"
    reason: "animated ring/counter variance"
  - surface_key: "suite:respiracion-running@light"
    reason: "animated ring/counter variance"
  - surface_key: "suite:respiracion-running@dark"
    reason: "animated ring/counter variance"
  - surface_key: "suite:rutina-add-task@dark"
    reason: "report hash volatility"

# ─── State-ambiguous pairs ────────────────────────────────────────────────
# These surface pairs have small inter-canonical distance (similar states)
# and require extra state verification at capture time. The harness v3
# (future) verifies capture_state_assertion matches the declared surface_key
# state via the V8 state fingerprint.

state_ambiguous_pairs:
  - ["suite:timer-running@light", "suite:timer-paused@light"]
  - ["suite:timer-running@dark",  "suite:timer-paused@dark"]
  - ["suite:respiracion-running@light", "suite:respiracion-paused@light"]
  - ["suite:respiracion-running@dark",  "suite:respiracion-paused@dark"]

# ─── Calibration status ──────────────────────────────────────────────────
# All values above are EXAMPLES pending corpus calibration in Fase 1A.
# Do NOT treat these thresholds as authoritative until Fase 1A calibration
# is complete and this file is renamed to measurement_config_v3.yaml (real).

calibration_status: "PENDING_FASE_1A"
