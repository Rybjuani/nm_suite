# Fase 0A skeleton — no runtime authority.
#
# This is an EXAMPLE of denylist.yaml for the agent runner. It is NOT
# consumed by any runtime. The real denylist.yaml is created in Fase 1B+
# when the harness v3 agent_runner/runner.py exists.
#
# The agent runner (future) refuses to dispatch prompts that request any
# operation in this denylist. Denylist is real but not the ONLY defense
# (anti-fraud multi-vector, semantic lint, gate, etc.).

_status: "Fase 0A skeleton — no runtime authority"

# ─── Forbidden operations ────────────────────────────────────────────────
# Agent prompts requesting any of these are refused by the runner.

forbidden_operations:
  - operation: "close_visual_key.py"
    reason: "V1 closer. Forensic. Replaced by harness/v3/ci_gate/gate.py."
  - operation: "replay_visual_closure.py"
    reason: "V1 replay. Forensic. Replaced by harness/v3/replay/replay.py."
  - operation: "replay_visual_closure.py --no-regen"
    reason: "--no-regen does not exist in V3.1. Structural replay is pre-check only, never closure."
  - operation: "reopen_legacy_all"
    reason: "Does not exist in V3.1. Use individual --reopen --key --reason --reviewer."
  - operation: "layered_visual_compare.py with --no-odiff / --no-panels / threshold overrides"
    reason: "Comparator Command Lock. Use visualparity compare --profile strict (thresholds are constants)."
  - operation: "anti_fraud_scan.py"
    reason: "V1 anti-fraud. Forensic. Replaced by harness/v3/anti_fraud/ (8 vectors)."
  - operation: "vas_gate.py"
    reason: "V1 VAS gate. Forensic. Replaced by harness/v3/state_assertion.py."
  - operation: "signature.sha256 as cryptographic signature"
    reason: "Prohibited. Use integrity/checksums.json + bundle_sha256 + vp_build_sha256 + policy_sha256 + closure_decision_sha256."
  - operation: "DECISIÓN-OWNER"
    reason: "Forbidden in active docs. Use OWNER_EXCEPTION_ACTIVE as signed record (reason + reviewer + timestamp), never as flag or bypass."
  - operation: "OWNER_EXCEPTION_ACTIVE as flag"
    reason: "Not a flag. Signed record only. Does not override HIGH_DIFF or LOW_DIFF."
  - operation: "qa/capture_v8.py --introspect"
    reason: "Disabled until vas_introspect.py is audited. capture_orchestrator.py does not pass --introspect by default."
  - operation: "visualparity invoking qa/capture_v8.py"
    reason: "VisualParity Core/CLI cannot invoke capture_v8.py. Only harness/v3/capture_orchestrator.py can."
  - operation: "agent invoking qa/capture_v8.py directly"
    reason: "Agents cannot invoke capture. Agents request capture via harness; harness orchestrates via capture_orchestrator.py."

# ─── Forbidden file edits ────────────────────────────────────────────────
# Agent prompts requesting edits to these paths are refused.

forbidden_edits:
  - path: "VISUAL_REPAIR_HANDOFF.md"
    reason: "Handoff is harness-owned (if it survives as view). Agents cannot edit."
  - path: "harness/v3/policy/**"
    reason: "Policy is governance. Agents cannot edit."
  - path: "harness/v3/anti_fraud/**"
    reason: "Anti-fraud is governance. Agents cannot edit."
  - path: "harness/v3/replay/**"
    reason: "Replay is governance. Agents cannot edit."
  - path: "harness/v3/semantic_lint/**"
    reason: "Semantic lint is governance. Agents cannot edit."
  - path: "harness/v3/evidence_records/**"
    reason: "Evidence records are immutable (except --reopen). Agents cannot edit."
  - path: "tools/visualparity/**"
    reason: "VisualParity Core/CLI is governance + measurement. Agents cannot edit."
  - path: "qa/_mockup_canonical/**"
    reason: "Canon is immutable (except owner-approved reconciliation). Agents cannot edit."
  - path: ".github/workflows/**"
    reason: "CI is governance. Agents cannot edit."

# ─── Forbidden states to emit ────────────────────────────────────────────
# Agent prompts requesting these states are refused.

forbidden_state_emissions:
  - state: "CLOSURE_PASS"
    reason: "Only harness v3 can emit CLOSURE_ALLOWED. VisualParity cannot emit CLOSURE_PASS."
  - state: "HUMAN_REVIEWED_PASS (bulk)"
    reason: "Bulk HUMAN_REVIEWED_PASS prohibited. One review_annotation.json per surface."
  - state: "ALLOW_CLOSURE for LOW_DIFF"
    reason: "LOW_DIFF never auto-closes. Requires HUMAN_REVIEWED_PASS individual."
  - state: "OVERRIDE for HIGH_DIFF"
    reason: "HIGH_DIFF has no override. Path is MEASUREMENT_DISPUTE (recalibración + regeneración)."
