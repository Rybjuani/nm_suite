<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroMood · Sistema visual — mockup completo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════════════════════
   NeuroMood — Polish visual global · MOCKUP COMPLETO
   Sistema visual aprobado (4 anclas) propagado a TODAS las pantallas de Suite y
   Hub. Estructura BLOQUEADA según capturas reales 960×600 (qa/nm_capturas_*).
   El polish vive en tipografía, jerarquía, superficie, profundidad, bordes,
   iconografía, indicadores, microespaciado y estados. Sin inventar funciones.

   Capas:  1 TOKENS · 2 COMPONENTES · 3 PANTALLAS · 4 SHELL (nav, no producto)
   ════════════════════════════════════════════════════════════════════════════ */

/* ╔═══ 1 · TOKENS ═══════════════════════════════════════════════════════════╗
   Derivados de shared/theme.py (V3_LIGHT/V3_DARK). Identidad conservada. */
:root, [data-theme="light"] {
  --canvas:#F4EFE5; --bg-1:#ECE5D4;
  --surface:#FBF8F1; --surface-2:#ECE5D4; --surface-3:#F6F1E7;
  --border:rgba(28,34,24,.10); --border-soft:rgba(28,34,24,.07); --border-strong:rgba(28,34,24,.20);
  --ink:#1C2218; --ink-2:#3F4636; --ink-muted:#76796B; --ink-faint:#8B8979;
  --primary:#305A48; --primary-soft:rgba(48,90,72,.10); --primary-ink:#FBF8F1;
  --accent:#B8633B; --accent-soft:rgba(184,99,59,.12);
  --teal:#2F7E73; --teal-soft:rgba(47,126,115,.12);
  --amber:#C68A2E; --amber-soft:rgba(198,138,46,.15);
  --success:#4D7A52; --success-soft:rgba(77,122,82,.13);
  --warning:#C68A2E; --warning-soft:rgba(198,138,46,.15);
  --danger:#B14B3B; --danger-soft:rgba(177,75,59,.13);
  --grad-from:#305A48; --grad-mid:#7B7140; --grad-to:#C68A2E;
  --av-sage:#305A48; --av-teal:#2F7E73; --av-terra:#B8633B;
  /* categorías (CATEGORY_COLORS theme.py) */
  --cat-auto:#4D7A52; --cat-fis:#2F7E73; --cat-cog:#305A48; --cat-pla:#B8633B; --cat-soc:#C68A2E; --cat-mae:#8A6FB0;
  --lift:linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,0) 42%);
  --shadow-card:0 1px 0 rgba(28,34,24,.02), 0 6px 18px -10px rgba(28,34,24,.22);
  --shadow-card-hover:0 2px 0 rgba(28,34,24,.03), 0 16px 34px -14px rgba(28,34,24,.30);
  --shadow-hero:0 1px 0 rgba(255,255,255,.5) inset, 0 10px 30px -16px rgba(28,34,24,.28);
  --shadow-window:0 40px 90px -30px rgba(28,34,24,.45), 0 8px 28px -16px rgba(28,34,24,.3);
  --ring-track:rgba(28,34,24,.10);
  --chrome:#EFE9DD; --chrome-ink:#1C2218;
}
[data-theme="dark"] {
  --canvas:#07091A; --bg-1:#0E132B;
  --surface:#141A38; --surface-2:#0E132B; --surface-3:#171E40;
  --border:rgba(255,255,255,.07); --border-soft:rgba(255,255,255,.045); --border-strong:rgba(255,255,255,.13);
  --ink:#ECECFB; --ink-2:#C7C9E5; --ink-muted:#8285A8; --ink-faint:#6A6F93;
  --primary:#A99CFF; --primary-soft:rgba(169,156,255,.13); --primary-ink:#0E132B;
  --accent:#5EE0C7; --accent-soft:rgba(94,224,199,.15);
  --teal:#5EE0C7; --teal-soft:rgba(94,224,199,.15);
  --amber:#E8B86A; --amber-soft:rgba(232,184,106,.16);
  --success:#60B89A; --success-soft:rgba(96,184,154,.17);
  --warning:#E8B86A; --warning-soft:rgba(232,184,106,.16);
  --danger:#FF8A7A; --danger-soft:rgba(255,138,122,.16);
  --grad-from:#A99CFF; --grad-mid:#C8A89B; --grad-to:#E8B86A;
  --av-sage:#A99CFF; --av-teal:#5EE0C7; --av-terra:#5EE0C7;
  --cat-auto:#60B89A; --cat-fis:#5EE0C7; --cat-cog:#A99CFF; --cat-pla:#E8A87C; --cat-soc:#E8B86A; --cat-mae:#B9A7FF;
  --lift:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0) 40%);
  --shadow-card:0 1px 0 rgba(0,0,0,.4), 0 8px 22px -12px rgba(0,0,0,.7);
  --shadow-card-hover:0 2px 0 rgba(0,0,0,.5), 0 20px 40px -16px rgba(0,0,0,.8);
  --shadow-hero:0 1px 0 rgba(255,255,255,.05) inset, 0 14px 34px -18px rgba(0,0,0,.75);
  --shadow-window:0 50px 110px -28px rgba(0,0,0,.8), 0 10px 30px -16px rgba(0,0,0,.6);
  --ring-track:rgba(255,255,255,.08);
  --chrome:#0B1024; --chrome-ink:#ECECFB;
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; }
body { font-family:'Manrope', system-ui, sans-serif; color:var(--ink);
  background:radial-gradient(120% 120% at 78% -10%, #2a3550, #0c1020 60%);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  display:flex; height:100vh; overflow:hidden; }

/* ╔═══ 4 · SHELL (nav rail — herramienta, no producto) ═════════════════════╗ */
.rail { width:248px; flex:0 0 248px; height:100%; display:flex; flex-direction:column;
  background:rgba(12,15,28,.86); backdrop-filter:blur(14px);
  border-right:1px solid rgba(255,255,255,.07); color:#e8eaf2; }
.rail-head { padding:18px 16px 12px; border-bottom:1px solid rgba(255,255,255,.07);
  display:flex; align-items:center; gap:10px; }
.rail-logo { width:30px; height:30px; border-radius:9px; display:grid; place-items:center;
  background:linear-gradient(135deg,#5EE0C7,#A99CFF); color:#0c1020; }
.rail-logo svg { width:18px; height:18px; }
.rail-title { font-size:13px; font-weight:700; letter-spacing:.01em; }
.rail-sub { font-size:10.5px; color:rgba(255,255,255,.45); font-weight:500; }
.rail-scroll { flex:1; overflow-y:auto; padding:8px 8px 20px; }
.rail-scroll::-webkit-scrollbar { width:7px; }
.rail-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,.14); border-radius:4px; }
.rail-grp { font-size:10px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
  color:rgba(255,255,255,.38); padding:14px 10px 6px; }
.nav { display:block; width:100%; text-align:left; appearance:none; border:none; cursor:pointer;
  font-family:inherit; font-size:12.5px; font-weight:500; color:rgba(255,255,255,.72);
  padding:7px 10px; border-radius:8px; background:transparent; transition:all .14s ease;
  display:flex; align-items:center; gap:8px; }
.nav:hover { background:rgba(255,255,255,.06); color:#fff; }
.nav.active { background:rgba(255,255,255,.13); color:#fff; box-shadow:inset 2px 0 0 #5EE0C7; }
.nav .ndot { width:5px; height:5px; border-radius:50%; background:currentColor; opacity:.5; flex:0 0 auto; }
.rail-foot { padding:12px 14px; border-top:1px solid rgba(255,255,255,.07); display:flex; align-items:center; gap:10px; }
.theme-sw { flex:1; display:flex; background:rgba(0,0,0,.3); border-radius:9px; padding:3px; gap:2px; }
.theme-sw button { flex:1; appearance:none; border:none; cursor:pointer; font-family:inherit;
  font-size:11.5px; font-weight:600; color:rgba(255,255,255,.6); padding:6px; border-radius:7px;
  background:transparent; display:flex; align-items:center; justify-content:center; gap:5px; transition:all .15s; }
.theme-sw button svg { width:13px; height:13px; }
.theme-sw button.on { background:rgba(255,255,255,.14); color:#fff; }

/* scroll container + inner: centra cuando entra, y permite scroll desde arriba
   cuando el viewport es más chico que la ventana (evita el recorte superior
   del flexbox centrado — causa de "no se ve" en pantallas bajas). */
.stage { flex:1; height:100%; overflow:auto; }
.stage-inner { min-height:100%; min-width:max-content; box-sizing:border-box;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:24px; }
.window { width:960px; height:600px; flex:0 0 auto; position:relative; border-radius:14px;
  overflow:hidden; background:var(--canvas); box-shadow:var(--shadow-window);
  border:1px solid var(--border-strong); transition:width .35s ease, background .45s ease; }
.window.narrow { width:520px; }
.screen { position:absolute; inset:0; display:none; flex-direction:column; }
.screen.show { display:flex; }
.cap { font-size:11.5px; color:rgba(255,255,255,.45); font-weight:500; letter-spacing:.03em; }

/* ╔═══ 2 · COMPONENTES COMPARTIDOS ═════════════════════════════════════════╗ */

/* Chrome / faux titlebar */
.chrome { height:36px; flex:0 0 36px; display:flex; align-items:center; gap:9px;
  padding:0 8px 0 12px; background:var(--chrome); color:var(--chrome-ink);
  border-bottom:1px solid var(--border-soft); transition:background .45s ease; }
.chrome-back { width:24px; height:24px; border-radius:7px; border:none; background:transparent;
  color:var(--ink-muted); cursor:pointer; display:grid; place-items:center; }
.chrome-back svg { width:15px; height:15px; }
.chrome-back:hover { background:var(--border); color:var(--ink); }
.chrome-glyph { width:22px; height:22px; border-radius:7px; display:grid; place-items:center;
  background:var(--primary-soft); color:var(--primary); }
.chrome-glyph svg { width:13px; height:13px; }
.chrome-title { font-size:12.5px; font-weight:700; }
.chrome-crumb { font-size:12.5px; font-weight:600; color:var(--ink-muted); }
.chrome-crumb::before { content:"/"; margin:0 7px; color:var(--ink-faint); font-weight:400; }
.chrome-sp { flex:1; }
.chrome-ctrls { display:flex; align-items:center; gap:2px; }
.cico { width:26px; height:26px; border-radius:7px; display:grid; place-items:center; color:var(--ink-muted);
  cursor:pointer; background:transparent; border:none; transition:all .15s; }
.cico svg { width:14px; height:14px; }
.cico:hover { background:var(--border); color:var(--ink); }
.cico.close:hover { background:var(--danger); color:#fff; }

/* tipografía utilitaria */
.eyebrow { font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-muted); }
.h-serif { font-family:'Newsreader', serif; }
.muted { color:var(--ink-muted); }

/* chips / pills / badges */
.chip { display:inline-flex; align-items:center; height:18px; padding:0 8px; font-size:11px;
  font-weight:600; border-radius:7px; color:var(--accent); background:var(--accent-soft); white-space:nowrap; }
.pill { display:inline-flex; align-items:center; height:21px; padding:0 9px; font-size:11px;
  font-weight:600; border-radius:8px; white-space:nowrap; }
.pill--success{color:var(--success);background:var(--success-soft);}
.pill--warning{color:var(--warning);background:var(--warning-soft);}
.pill--teal{color:var(--teal);background:var(--teal-soft);}
.pill--primary{color:var(--primary);background:var(--primary-soft);}
.pill--accent{color:var(--accent);background:var(--accent-soft);}
.badge { display:inline-flex; align-items:center; height:20px; padding:0 9px; font-size:11px; font-weight:600;
  border-radius:999px; color:var(--teal); background:var(--teal-soft);
  border:1px solid color-mix(in srgb, var(--teal) 22%, transparent); }

/* botones */
.btn { appearance:none; cursor:pointer; font-family:inherit; font-weight:600; font-size:12.5px;
  height:34px; padding:0 16px; border-radius:999px; display:inline-flex; align-items:center; justify-content:center;
  gap:6px; border:1px solid transparent; transition:all .16s ease; white-space:nowrap; }
.btn svg { width:14px; height:14px; }
.btn--primary { background:var(--primary); color:var(--primary-ink); box-shadow:0 4px 12px -5px color-mix(in srgb,var(--primary) 60%,transparent); }
.btn--primary:hover { filter:brightness(1.06); transform:translateY(-1px); }
.btn--secondary { background:var(--surface); color:var(--ink-2); border-color:var(--border-strong);
  box-shadow:0 1px 0 rgba(255,255,255,.05) inset; }
.btn--secondary:hover { border-color:var(--primary); color:var(--primary); background:var(--primary-soft); transform:translateY(-1px); }
.btn--ghost { background:transparent; color:var(--ink-2); border-color:transparent; }
.btn--ghost:hover { background:var(--border); }
.btn--disabled { background:var(--surface-2); color:var(--ink-faint); border-color:var(--border-soft); cursor:default; box-shadow:none; }
.btn--sm { height:30px; font-size:12px; padding:0 13px; }
.btn:focus-visible { outline:none; box-shadow:0 0 0 3px var(--primary-soft); }
.link { font-size:12px; font-weight:600; color:var(--primary); cursor:pointer; }
.link:hover { text-decoration:underline; }

/* card */
.card { position:relative; background:var(--surface); border:1px solid var(--border-strong);
  border-radius:16px; box-shadow:var(--shadow-card); }
.card::before { content:""; position:absolute; inset:0; border-radius:inherit; background:var(--lift); pointer-events:none; }
.card > * { position:relative; }

/* segmented control */
.seg { display:inline-flex; background:var(--surface-2); border-radius:11px; padding:3px; gap:2px;
  border:1px solid var(--border-soft); }
.seg button { appearance:none; border:none; cursor:pointer; font-family:inherit; font-size:12px; font-weight:600;
  color:var(--ink-muted); padding:6px 14px; border-radius:8px; background:transparent; transition:all .15s; }
.seg button:hover { color:var(--ink); }
.seg button.on { background:var(--primary); color:var(--primary-ink); box-shadow:0 2px 8px -4px color-mix(in srgb,var(--primary) 70%,transparent); }

/* filtros (pills tipo tab, p.ej. categorías / DBT) */
.filters { display:flex; gap:7px; flex-wrap:wrap; }
.fpill { appearance:none; border:1px solid var(--border-strong); cursor:pointer; font-family:inherit;
  font-size:12px; font-weight:600; color:var(--ink-2); padding:7px 14px; border-radius:999px;
  background:var(--surface); transition:all .15s; }
.fpill:hover { border-color:var(--primary); color:var(--primary); }
.fpill.on { background:var(--primary); color:var(--primary-ink); border-color:var(--primary); }

/* tabs segmentadas anchas (Hub detalle) */
.tabs { display:flex; gap:4px; background:var(--surface-2); border:1px solid var(--border-soft);
  border-radius:12px; padding:4px; }
.tab { appearance:none; border:none; cursor:pointer; font-family:inherit; font-size:12.5px; font-weight:600;
  color:var(--ink-muted); padding:8px 16px; border-radius:9px; background:transparent; transition:all .15s; white-space:nowrap; }
.tab:hover { color:var(--ink); }
.tab.on { background:var(--primary); color:var(--primary-ink); }

/* inputs */
.field, .ta, .sel { width:100%; font-family:inherit; font-size:12.5px; color:var(--ink);
  background:var(--surface-2); border:1px solid var(--border-strong); border-radius:12px;
  padding:9px 13px; transition:border-color .15s, box-shadow .15s; }
.field::placeholder, .ta::placeholder { color:var(--ink-faint); }
.field:focus, .ta:focus, .sel:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft); }
.field.focused { border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft); }
.ta { resize:none; line-height:1.5; }
.sel { display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
.sel svg { width:13px; height:13px; color:var(--ink-muted); }
.flabel { font-size:11px; font-weight:600; color:var(--ink-2); margin-bottom:5px; display:block; }
.counter { font-size:11px; color:var(--ink-faint); text-align:right; }

/* anillo (firma) */
.ring { position:relative; display:grid; place-items:center; }
.ring svg { transform:rotate(-90deg); }
.ring .ring-track { fill:none; stroke:var(--ring-track); }
.ring .ring-arc { fill:none; stroke-linecap:round; }
.ring .ring-val { position:absolute; font-family:'JetBrains Mono', monospace; color:var(--ink); font-weight:500; }

/* sparkline */
.spark .spark-line { fill:none; stroke:var(--primary); stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
.spark .spark-dot { fill:var(--primary); }

/* avatar */
.avatar { border-radius:10px; display:grid; place-items:center; font-weight:700; color:#fff;
  letter-spacing:.02em; border:1px solid rgba(255,255,255,.4); flex:0 0 auto; box-shadow:0 2px 6px -3px rgba(0,0,0,.4); }
[data-theme="dark"] .avatar { border-color:rgba(255,255,255,.2); }
.av0{background:linear-gradient(135deg,var(--av-sage),var(--av-teal));}
.av1{background:linear-gradient(135deg,var(--av-teal),var(--av-terra));}
.av2{background:linear-gradient(135deg,var(--av-terra),var(--av-sage));}
.av3{background:linear-gradient(135deg,var(--av-sage),var(--av-terra));}

/* checkbox */
.cbx { width:20px; height:20px; border-radius:6px; border:1.5px solid var(--border-strong);
  background:var(--surface-2); display:grid; place-items:center; cursor:pointer; flex:0 0 auto; transition:all .15s; }
.cbx svg { width:13px; height:13px; color:#fff; opacity:0; }
.cbx.on { background:var(--primary); border-color:var(--primary); }
.cbx.on svg { opacity:1; }

/* empty state */
.empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; text-align:center; padding:24px; }
.empty-ic { width:52px; height:52px; border-radius:15px; display:grid; place-items:center;
  background:var(--primary-soft); color:var(--primary); }
.empty-ic svg { width:26px; height:26px; }
.empty-t { font-family:'Newsreader',serif; font-size:21px; font-weight:600; color:var(--ink); }
.empty-d { font-size:12.5px; color:var(--ink-muted); max-width:380px; line-height:1.5; }

/* stat card */
.stat { flex:1; border-top:1px solid var(--border); padding:10px 14px; }
.stat .stat-v { font-family:'Newsreader',serif; font-size:18px; font-weight:600; color:var(--ink); margin-top:2px; }
.stat .stat-d { font-size:11px; color:var(--ink-muted); margin-top:1px; }

/* ───────────── 3 · PANTALLAS ───────────── */

/* helpers de layout módulo */
.body { flex:1; min-height:0; display:flex; flex-direction:column; padding:14px 24px 12px; transition:background .45s ease; }
.body--suite { background:radial-gradient(80% 60% at 88% -10%, var(--primary-soft), transparent 60%), var(--canvas); }
.body--hub { background:radial-gradient(70% 50% at 96% -8%, var(--teal-soft), transparent 60%), var(--canvas); padding:6px 14px 0; }
.two { display:flex; gap:14px; flex:1; min-height:0; }

/* SUITE HOME */
.hero { position:relative; border-radius:16px; padding:16px 24px; overflow:hidden;
  background:linear-gradient(135deg, var(--primary-soft), var(--surface));
  border:1px solid var(--border); box-shadow:var(--shadow-hero); }
.hero-greet { font-family:'Newsreader',serif; font-size:26px; font-weight:600; letter-spacing:-.01em; color:var(--ink); margin-top:2px; line-height:1.18; }
.hero-row { display:flex; align-items:baseline; gap:7px; margin-top:7px; }
.hero-score { font-family:'Newsreader',serif; font-size:30px; font-weight:600; line-height:1; color:var(--accent); letter-spacing:-.01em; }
.hero-unit { font-size:13px; color:var(--ink-muted); font-weight:500; }
.hero-delta { font-size:13px; font-weight:700; color:var(--teal); }
.hero-bar { margin-top:10px; height:5px; border-radius:999px; background:var(--ring-track); overflow:hidden; }
.hero-fill { height:100%; border-radius:999px; background:linear-gradient(90deg,var(--grad-from),var(--grad-mid),var(--grad-to));
  box-shadow:0 0 10px -2px color-mix(in srgb,var(--grad-to) 55%, transparent); }
.modlabel { margin:14px 2px 8px; }
.modgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; flex:1; min-height:0; }
.mod { position:relative; background:var(--surface); border:1px solid var(--border-strong); border-radius:16px;
  padding:14px 18px; display:flex; flex-direction:column; box-shadow:var(--shadow-card); cursor:pointer; overflow:hidden;
  transition:transform .18s, box-shadow .18s, border-color .18s; --mod-c:color-mix(in srgb,var(--grad-from),var(--grad-to) var(--t)); }
.mod::before { content:""; position:absolute; inset:0; border-radius:inherit; background:var(--lift); pointer-events:none; }
.mod:hover { transform:translateY(-3px); box-shadow:var(--shadow-card-hover); border-color:color-mix(in srgb,var(--mod-c) 55%,var(--border-strong)); }
.mod-top { display:flex; align-items:center; justify-content:space-between; }
.mod-ico { color:var(--mod-c); display:grid; place-items:center; position:relative; }
.mod-ico svg { width:18px; height:18px; }
.mod-title { font-size:12px; font-weight:600; color:var(--ink); line-height:1.28; margin-top:8px; position:relative; }
.mod-desc { font-size:11px; color:var(--ink-muted); line-height:1.3; margin-top:2px; position:relative; }
.mod-foot { margin-top:auto; padding-top:10px; position:relative; }

/* HUB roster */
.roster { flex:1; min-height:0; display:flex; flex-direction:column; padding:8px 8px 4px; border-radius:16px; }
.roster-meta { display:flex; align-items:center; gap:9px; padding:2px 4px 0; margin-bottom:2px; }
.roster-title { font-size:12.5px; font-weight:800; color:var(--ink); }
.roster-hint { font-size:11px; color:var(--ink-muted); }
.cols { display:flex; align-items:center; padding:0 14px 10px 76px; gap:12px; }

const sparkSVG = ()=>{
  const w=64,h=22,pad=3,n=SPARK.length,mn=Math.min(...SPARK),mx=Math.max(...SPARK),span=(mx-mn)||1;
  const pts=SPARK.map((v,i)=>[pad+i*(w-2*pad)/(n-1), pad+(h-2*pad)-((v-mn)/span)*(h-2*pad)]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const last=pts[pts.length-1], g='s'+Math.random().toString(36).slice(2,6);
  const area=`M${pts[0][0].toFixed(1)} ${(h-pad)} `+pts.map(p=>'L'+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+` L${last[0].toFixed(1)} ${(h-pad)} Z`;
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><defs><linearGradient id="${g}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--primary)" stop-opacity=".22"/><stop offset="1" stop-color="var(--primary)" stop-opacity="0"/></linearGradient></defs><path d="${area}" fill="url(#${g})"/><path class="spark-line" d="${d}"/><circle class="spark-dot" cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.4"/></svg>`;
};
const ringSVG = (pct,size=36,sw=3,showVal=true)=>{
  const r=(size-sw)/2-.5, c=2*Math.PI*r, off=c*(1-pct/100), g='r'+Math.random().toString(36).slice(2,6);
  const fs=Math.max(9,Math.round(size*0.2));
  return `<div class="ring" style="width:${size}px;height:${size}px"><svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><defs><linearGradient id="${g}" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="var(--grad-from)"/><stop offset=".5" stop-color="var(--grad-mid)"/><stop offset="1" stop-color="var(--grad-to)"/></linearGradient></defs><circle class="ring-track" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="${sw}"/>${pct>0?`<circle class="ring-arc" cx="${size/2}" cy="${size/2}" r="${r}" stroke="url(#${g})" stroke-width="${sw}" stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"/>`:''}</svg>${showVal?`<span class="ring-val" style="font-size:${fs}px">${pct}%</span>`:''}</div>`;
};
const areaChart = ()=>{
  const data=[5.3,6,5,6.3,6,7.4,6.9], labels=['L','M','M','J','V','S','D'];
  const w=420,h=200,padL=24,padR=10,padT=20,padB=24, pw=w-padL-padR, ph=h-padT-padB;
  const xy=(i,v)=>[padL+i*pw/(data.length-1), padT+ph-(v/10)*ph];
  const pts=data.map((v,i)=>xy(i,v));
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=`M${pts[0][0].toFixed(1)} ${padT+ph} `+pts.map(p=>'L'+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+` L${pts[pts.length-1][0].toFixed(1)} ${padT+ph} Z`;
  const yl=[10,5,0].map(v=>{const y=padT+ph-(v/10)*ph;return `<text x="${padL-8}" y="${y+3}" text-anchor="end" font-size="11" fill="var(--ink-faint)">${v}</text><line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="var(--border-soft)" stroke-dasharray="2 3"/>`;}).join('');
  const xl=labels.map((l,i)=>`<text x="${xy(i,0)[0]}" y="${h-6}" text-anchor="middle" font-size="11" fill="var(--ink-muted)">${l}</text>`).join('');
  const dots=pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.6" fill="var(--surface)" stroke="var(--teal)" stroke-width="1.6"/>`).join('');
  return `<svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet"><defs><linearGradient id="ac" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--teal)" stop-opacity=".28"/><stop offset="1" stop-color="var(--teal)" stop-opacity="0"/></linearGradient></defs>${yl}<path d="${area}" fill="url(#ac)"/><path d="${line}" fill="none" stroke="var(--teal)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${dots}${xl}</svg>`;
};

SCREENS['timer'] = (variant,preset)=>{ // variant: 'idle'|'running'|'paused'|'empty'  preset: {name,time}

  const name = (preset && preset.name) || 'Lectura';
  const time = variant==='running'?'24:12':variant==='paused'?'18:45':((preset && preset.time) || '25:00');
  const pct = variant==='running'?14:variant==='paused'?34:0;
  const status = variant==='running'?'En curso':variant==='paused'?'En pausa':'Listo para empezar';

};

/* ════ RUNTIME ════ */
const root=document.documentElement, win=document.getElementById('window'), cap=document.getElementById('cap'), navEl=document.getElementById('nav');
let current=GROUPS[0][1][0];
function buildNav(){
  navEl.innerHTML = GROUPS.map((g,gi)=>`<div class="rail-grp">${g[0]}</div>`+g[1].map((s,si)=>`<button class="nav" data-g="${gi}" data-s="${si}"><span class="ndot"></span>${s[0]}</button>`).join('')).join('');
  navEl.querySelectorAll('.nav').forEach(b=>b.addEventListener('click',()=>{
    navEl.querySelectorAll('.nav').forEach(x=>x.classList.remove('active')); b.classList.add('active');
    current=GROUPS[+b.dataset.g][1][+b.dataset.s]; render();
  }));
  navEl.querySelector('.nav').classList.add('active');
}
function render(){
  win.classList.toggle('narrow', current[2]==='narrow');
  win.innerHTML = `<section class="screen show">${current[1]()}</section>`;
  cap.textContent = current[0];
  wire();
}
function wire(){
  win.querySelectorAll('.js-theme').forEach(b=>b.addEventListener('click',toggleTheme));
  // estados selected demostrables
  win.querySelectorAll('.prow').forEach(r=>r.addEventListener('click',e=>{ if(e.target.closest('.p-x'))return;
    win.querySelectorAll('.prow').forEach(x=>x.classList.remove('sel')); r.classList.add('sel'); }));
  win.querySelectorAll('.cbx').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('on')));
}
function setTheme(t){
  root.dataset.theme=t;
  document.querySelectorAll('.theme-sw button').forEach(b=>b.classList.toggle('on', b.dataset.th===t));
  render();
}
function toggleTheme(){ setTheme(root.dataset.theme==='dark'?'light':'dark'); }
document.querySelectorAll('.theme-sw button').forEach(b=>b.addEventListener('click',()=>setTheme(b.dataset.th)));
addEventListener('keydown',e=>{ if(e.key.toLowerCase()==='t') toggleTheme(); });

buildNav(); render();
</script>
