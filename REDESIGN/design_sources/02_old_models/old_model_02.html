// ── AppShell: window con sidebar + main ───────────────────────────────────────
function V3Shell({ children, sidebar, width = 1280, height = 820, mode = "light",
                   defaultMode = null, ambient = "teal-violet" }) {
  // Si defaultMode se setea, el shell es stateful (toggle interno funciona).
  // Si no, queda fijo al `mode` prop (para mostrar light+dark side-by-side).
  const [internalMode, setInternalMode] = React.useState(defaultMode || mode);
  const isStateful = defaultMode !== null;
  const currentMode = isStateful ? internalMode : mode;
  const setMode = isStateful ? setInternalMode : null;
  return (
    <V3Provider mode={currentMode}>
      <V3ShellInner width={width} height={height} sidebar={sidebar}
                    mode={currentMode} setMode={setMode} ambient={ambient}>
        {children}
      </V3ShellInner>
    </V3Provider>
  );
}

function V3ShellInner({ children, sidebar, width, height, mode, setMode, ambient }) {
  const { c, isDark } = useV3Theme();
  // Ambient glow positions per palette
  const glows = {
    "teal-violet": [
      ["15% 12%", c.teal,   isDark ? .25 : .12],
      ["85% 18%", c.violet, isDark ? .22 : .10],
      ["50% 85%", c.cyan,   isDark ? .18 : .06],
    ],
    "warm": [
      ["20% 15%", "#fbbf24", isDark ? .20 : .10],
      ["80% 85%", c.violet,  isDark ? .18 : .08],
    ],
  };
  const bgLayers = (glows[ambient] || glows["teal-violet"])
    .map(([pos, col, op]) => `radial-gradient(circle at ${pos}, ${col}${Math.round(op*255).toString(16).padStart(2,"0")}, transparent 50%)`)
    .join(", ");
  return (
    <div style={{
      width, height,
      borderRadius: 16,
      background: isDark
        ? "linear-gradient(135deg, #0a0d1a 0%, #060912 100%)"
        : "linear-gradient(135deg, #f5f8fc 0%, #e8eef7 100%)",
      boxShadow: isDark
        ? "0 30px 80px -20px rgba(0,0,0,.6), 0 0 0 1px rgba(94,234,212,.08)"
        : "0 30px 80px -20px rgba(15,23,42,.15), 0 0 0 1px rgba(15,23,42,.04)",
      border: isDark ? "1px solid rgba(94,234,212,.08)" : "1px solid rgba(15,23,42,.04)",
      overflow: "hidden",
      display: "grid",
      gridTemplateRows: "auto 1fr",
      fontFamily: V3_FONT.sans,
      color: c.text,
      position: "relative",
      transition: "background .35s ease, color .35s ease, border-color .35s ease, box-shadow .35s ease",
    }}>
      {/* Ambient bg glow blobs */}
      <div style={{
        position: "absolute", inset: 0,
        background: bgLayers,
        pointerEvents: "none",
        transition: "opacity .35s ease",
      }}/>
      {/* Window titlebar (compact, minimal — Win11 style) */}
      <div style={{
        height: 44,
        padding: "0 12px 0 16px",
        display: "flex",
        alignItems: "center",
        justifyContent: "space-between",
        position: "relative",
      }}>
        <V3Logo size={20} asIcon withWordmark={false}/>
        <div style={{ display: "flex", gap: 4 }}>
          {[
            <path key="m" d="M2 7h10" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/>,
            <rect key="x" x="2.5" y="2.5" width="9" height="9" rx="1" stroke="currentColor" strokeWidth="1.3" fill="none"/>,
            <path key="c" d="M3 3l8 8M11 3l-8 8" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/>,
          ].map((p, i) => (
            <div key={i} style={{
              width: 32, height: 28, borderRadius: 4,
              display: "flex", alignItems: "center", justifyContent: "center",
              color: c.text3,
              background: "transparent",
            }}>
              <svg width="14" height="14" viewBox="0 0 14 14">{p}</svg>
            </div>
          ))}
        </div>
      </div>
      <div style={{
        display: "grid",
        gridTemplateColumns: sidebar ? "240px 1fr" : "1fr",
        height: "100%",
        overflow: "hidden",
        position: "relative",
      }}>
        {sidebar && (
          <div style={{
            background: c.bgSidebar,
            borderRight: isDark ? "1px solid rgba(94,234,212,.08)" : "1px solid #e8edf5",
            overflow: "hidden",
            display: "flex",
            flexDirection: "column",
            position: "relative",
            transition: "background .35s ease, border-color .35s ease",
          }}>
            {/* pasamos setMode al sidebar/header vía context */}
            <V3ModeContext.Provider value={{ mode, setMode }}>
              {sidebar}
            </V3ModeContext.Provider>
          </div>
        )}
        <div style={{ overflow: "hidden", position: "relative" }}>
          <V3ModeContext.Provider value={{ mode, setMode }}>
            {children}
          </V3ModeContext.Provider>
        </div>
      </div>
    </div>
  );
}

            {avatar || name.split(" ").map(n => n[0]).slice(0, 2).join("")}
            <span style={{
              position: "absolute", bottom: 0, right: 0,
              width: 10, height: 10, borderRadius: 999,
              background: c.success,
              border: `2px solid ${c.surface}`,
            }}/>
          </div>
          <div>
            <div style={{ fontSize: 13, fontWeight: 700, color: c.text }}>{name}</div>
            <div style={{ fontSize: 10, color: c.text3 }}>{role}</div>
          </div>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M3 4.5L6 7.5L9 4.5" stroke={c.text3} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
      </div>
    </div>
  );
}

function ThemeToggle({ mode, onToggleMode }) {
  const { c, isDark } = useV3Theme();
  // Si no se pasa onToggleMode, usar el del V3ModeContext (toggle interno del shell)
  const ctx = React.useContext(V3ModeContext);
  const toggle = onToggleMode || (() => ctx.setMode && ctx.setMode(ctx.mode === "dark" ? "light" : "dark"));
  return (
    <div onClick={toggle} style={{
      padding: "8px 12px",
      borderRadius: 14,
      background: c.surface,
      border: `1px solid ${c.borderSoft}`,
      display: "flex", alignItems: "center", gap: 8,
      cursor: "pointer",
      boxShadow: isDark ? "0 0 0 1px rgba(94,234,212,.05)" : "0 2px 8px rgba(15,23,42,.04)",
      transition: "background .35s ease, border-color .35s ease, box-shadow .35s ease",
    }}>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ transition: "transform .35s ease" }}>
        {isDark ? (
          <path d="M11.5 8.5A4.5 4.5 0 0 1 5.5 2.5a5 5 0 1 0 6 6z" fill={c.teal} opacity=".9"/>
        ) : (
          <>
            <circle cx="7" cy="7" r="3" stroke={c.text2} strokeWidth="1.3"/>
            {[0,45,90,135,180,225,270,315].map(a => (
              <line key={a} x1="7" y1="1.5" x2="7" y2="2.8" stroke={c.text2} strokeWidth="1.3" strokeLinecap="round" transform={`rotate(${a} 7 7)`}/>
            ))}
          </>
        )}
      </svg>
      <div style={{
        width: 36, height: 20, borderRadius: 999,
        background: isDark ? `linear-gradient(135deg, ${c.gradFrom}, ${c.gradTo})` : "#cbd5e1",
        position: "relative",
        transition: "background .35s ease",
      }}>
        <div style={{
          position: "absolute",
          top: 2, left: isDark ? 18 : 2,
          width: 16, height: 16, borderRadius: 999,
          background: "#fff",
          boxShadow: "0 1px 3px rgba(0,0,0,.2)",
          transition: "left .35s ease",
        }}/>
      </div>
    </div>
  );
}

// ── V3 Card ──────────────────────────────────────────────────────────────────
function V3Card({ children, padding = 22, style = {}, glow = false, interactive = false }) {
  const { c, isDark } = useV3Theme();
  return (
    <div style={{
      background: isDark ? c.surfaceSolid : c.surface,
      borderRadius: 18,
      border: `1px solid ${c.borderSoft}`,
      padding,
      boxShadow: isDark
        ? (glow ? "0 0 0 1px rgba(94,234,212,.15), 0 0 40px -10px rgba(94,234,212,.18)" : "0 0 0 1px rgba(255,255,255,.03)")
        : "0 1px 3px rgba(15,23,42,.04), 0 4px 16px -4px rgba(15,23,42,.06)",
      position: "relative",
      transition: "background .35s ease, border-color .35s ease, box-shadow .35s ease, color .35s ease",
      ...(isDark && {
        backdropFilter: "blur(10px) saturate(1.2)",
        background: glow
          ? "linear-gradient(135deg, rgba(20,28,48,.85), rgba(15,22,40,.75))"
          : "rgba(18,28,45,.7)",
      }),
      ...style,
    }}>
      {children}
    </div>
  );
}

// ── V3 Button (gradient pill style) ───────────────────────────────────────────
function V3Button({ children, gradient = false, variant = "secondary", size = "md",
                    fullWidth = false, icon = null, onClick, style = {} }) {
  const { c, isDark } = useV3Theme();
  const sizes = {
    sm: { px: 14, h: 32, fs: 12 },
    md: { px: 18, h: 40, fs: 13 },
    lg: { px: 24, h: 48, fs: 14 },
  };
  const s = sizes[size];
  const baseStyle = {
    display: "inline-flex",
    alignItems: "center",
    justifyContent: "center",
    gap: 8,
    width: fullWidth ? "100%" : "auto",
    height: s.h,
    padding: `0 ${s.px}px`,
    borderRadius: 999,
    fontSize: s.fs,
    fontWeight: 600,
    fontFamily: V3_FONT.sans,
    cursor: "pointer",
    border: "none",
    transition: "all .15s ease",
    letterSpacing: ".005em",
    ...style,
  };
  if (gradient) {
    Object.assign(baseStyle, {
      background: `linear-gradient(135deg, ${c.gradFrom}, ${c.gradTo})`,
      color: "#fff",
      boxShadow: `0 8px 20px -6px ${c.teal}66, 0 4px 12px -2px ${c.violet}44`,
    });
  } else if (variant === "primary") {
    Object.assign(baseStyle, {
      background: c.teal,
      color: "#fff",
      boxShadow: `0 4px 12px -2px ${c.teal}55`,
    });
  } else if (variant === "secondary") {
    Object.assign(baseStyle, {
      background: c.surface,
      color: c.text,
      border: `1px solid ${c.border}`,
      boxShadow: isDark ? "none" : "0 1px 2px rgba(15,23,42,.04)",
    });
  } else if (variant === "ghost") {
    Object.assign(baseStyle, {
      background: "transparent",
      color: c.text2,
    });
  }
  return (
    <button onClick={onClick} style={baseStyle}>
      {icon}
      {children}
    </button>
  );
}

// ── V3 Ring (gradient progress) ──────────────────────────────────────────────
function V3Ring({ pct = 0, size = 120, stroke = 10, value = null, sub = null,
                  showGlow = false }) {
  const { c, isDark } = useV3Theme();
  const r = (size - stroke) / 2;
  const C = 2 * Math.PI * r;
  const dash = (pct / 100) * C;
  const id = `ring${Math.random().toString(36).slice(2, 7)}`;
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: "rotate(-90deg)" }}>
        <defs>
          <linearGradient id={id} x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stopColor={c.gradFrom}/>
            <stop offset="50%"  stopColor={c.gradMid}/>
            <stop offset="100%" stopColor={c.gradTo}/>
          </linearGradient>
          {(isDark || showGlow) && (
            <filter id={`${id}-glow`}>
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          )}
        </defs>
        <circle cx={size/2} cy={size/2} r={r}
                stroke={isDark ? "rgba(255,255,255,.06)" : "#e8edf5"}
                strokeWidth={stroke} fill="none"/>
        <circle cx={size/2} cy={size/2} r={r}
                stroke={`url(#${id})`}
                strokeWidth={stroke} fill="none"
                strokeDasharray={`${dash} ${C}`}
                strokeLinecap="round"
                filter={(isDark || showGlow) ? `url(#${id}-glow)` : undefined}/>
      </svg>
      {(value !== null || sub) && (
        <div style={{
          position: "absolute", inset: 0,
          display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center",
          fontFamily: V3_FONT.sans,
        }}>
          {value !== null && (
            <div style={{ fontSize: size * 0.34, fontWeight: 700, color: c.text, lineHeight: 1, letterSpacing: "-.02em" }}>
              {value}
            </div>
          )}
          {sub && (
            <div style={{ fontSize: size * 0.10, color: c.text3, marginTop: 4 }}>
              {sub}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── V3 Wave Chart (smooth gradient) ──────────────────────────────────────────
function V3WaveChart({ data = [3, 6, 4, 7, 5, 8, 9], labels = null, height = 200,
                       highlight = null, glow = false }) {
  const { c, isDark } = useV3Theme();
  const id = `wave${Math.random().toString(36).slice(2, 7)}`;
  const w = 600, h = height;
  const padding = { top: 30, right: 30, bottom: 30, left: 30 };
  const innerW = w - padding.left - padding.right;
  const innerH = h - padding.top - padding.bottom;
  const max = 10, min = 0;
  const px = i => padding.left + (i / (data.length - 1)) * innerW;
  const py = v => padding.top + (1 - (v - min) / (max - min)) * innerH;
  // smooth path
  const pts = data.map((v, i) => [px(i), py(v)]);
  let d = `M ${pts[0][0]} ${pts[0][1]}`;
  for (let i = 1; i < pts.length; i++) {
    const [x0, y0] = pts[i - 1];
    const [x1, y1] = pts[i];
    const cx0 = x0 + (x1 - x0) / 2;
    const cx1 = x0 + (x1 - x0) / 2;
    d += ` C ${cx0} ${y0} ${cx1} ${y1} ${x1} ${y1}`;
  }
  const fillD = d + ` L ${pts[pts.length-1][0]} ${h - padding.bottom} L ${pts[0][0]} ${h - padding.bottom} Z`;

  return (
    <div style={{ width: "100%", height, position: "relative" }}>
      <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ width: "100%", height: "100%" }}>
        <defs>
          <linearGradient id={id} x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stopColor={c.gradFrom}/>
            <stop offset="50%"  stopColor={c.gradMid}/>
            <stop offset="100%" stopColor={c.gradTo}/>
          </linearGradient>
          <linearGradient id={`${id}-fill`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stopColor={c.teal} stopOpacity={isDark ? ".25" : ".18"}/>
            <stop offset="50%"  stopColor={c.violet} stopOpacity={isDark ? ".12" : ".10"}/>
            <stop offset="100%" stopColor={c.violet} stopOpacity="0"/>
          </linearGradient>
          {(isDark || glow) && (
            <filter id={`${id}-glow`}>
              <feGaussianBlur stdDeviation="2.5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          )}
        </defs>
        {/* gridlines */}
        {[0, 0.25, 0.5, 0.75, 1].map(t => {
          const y = padding.top + t * innerH;
          return (
            <line key={t} x1={padding.left} y1={y} x2={w - padding.right} y2={y}
                  stroke={isDark ? "rgba(255,255,255,.05)" : "#e8edf5"}
                  strokeDasharray="3 4"/>
          );
        })}
        {/* y-axis values */}
        {[10, 8, 6, 4, 2, 0].map(v => (
          <text key={v} x={padding.left - 8} y={py(v) + 3}
                fill={c.text3} fontSize="9" textAnchor="end"
                fontFamily={V3_FONT.sans}>{v}</text>
        ))}
        {/* area */}
        <path d={fillD} fill={`url(#${id}-fill)`}/>
        {/* line */}
        <path d={d} stroke={`url(#${id})`} strokeWidth="3" fill="none" strokeLinecap="round"
              filter={(isDark || glow) ? `url(#${id}-glow)` : undefined}/>
        {/* points */}
        {pts.map(([x, y], i) => {
          const isHi = highlight === i;
          return (
            <g key={i}>
              <circle cx={x} cy={y} r={isHi ? "8" : "5"}
                      fill={isDark ? "#0a0d1a" : "#fff"}
                      stroke={isHi ? c.violet : c.teal}
                      strokeWidth={isHi ? "3" : "2"}/>
              {isHi && (
                <circle cx={x} cy={y} r="14" fill={c.violet} opacity=".15"/>
              )}
            </g>
          );
        })}
        {/* dashed vertical at highlight */}
        {highlight !== null && highlight !== undefined && (
          <line x1={pts[highlight][0]} y1={padding.top}
                x2={pts[highlight][0]} y2={h - padding.bottom}
                stroke={c.violet} strokeWidth="1.5"
                strokeDasharray="3 3" opacity=".4"/>
        )}
      </svg>
      {/* x-axis labels */}
      {labels && (
        <div style={{
          position: "absolute", bottom: 4, left: 0, right: 0,
          display: "flex", justifyContent: "space-between",
          padding: "0 30px",
          fontSize: 10, color: c.text3, fontWeight: 500,
        }}>
          {labels.map((l, i) => (
            <span key={i} style={{
              color: highlight === i ? c.violet : c.text3,
              fontWeight: highlight === i ? 700 : 500,
            }}>{l}</span>
          ))}
        </div>
      )}
    </div>
  );
}

// ── V3 Tab Pill ──────────────────────────────────────────────────────────────
function V3Tabs({ items, active, onChange }) {
  const { c, isDark } = useV3Theme();
  return (
    <div style={{ display: "flex", gap: 6 }}>
      {items.map(it => {
        const a = it === active;
        return (
          <button key={it} onClick={() => onChange && onChange(it)} style={{
            padding: "8px 18px",
            borderRadius: 999,
            background: a ? c.teal : "transparent",
            color: a ? "#fff" : c.text2,
            border: a ? "none" : `1px solid ${c.borderSoft}`,
            fontSize: 12, fontWeight: 600,
            fontFamily: V3_FONT.sans,
            cursor: "pointer",
            boxShadow: a ? `0 4px 12px -2px ${c.teal}55` : "none",
          }}>{it}</button>
        );
      })}
    </div>
  );
}

// ── V3 Eyebrow + Big Title ───────────────────────────────────────────────────
function V3SectionTitle({ children, sub = null, action = null }) {
  const { c } = useV3Theme();
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
      <div>
        <div style={{ fontSize: 18, fontWeight: 700, color: c.text, letterSpacing: "-.01em" }}>
          {children}
        </div>
        {sub && <div style={{ fontSize: 12, color: c.text2, marginTop: 2 }}>{sub}</div>}
      </div>
      {action}
    </div>
  );
}

Object.assign(window, {
  V3_LIGHT, V3_DARK, V3_FONT,
  useV3, useV3Theme, V3Provider, V3ModeContext,
  V3Logo, V3Shell, V3ShellInner, V3Sidebar, V3Header, ThemeToggle,
  V3Card, V3Button, V3Ring, V3WaveChart, V3Tabs, V3SectionTitle,
});

</script>

<!-- ===== v3-emojis.jsx ===== -->
<script type="text/babel">
/* v3-emojis.jsx — Sistema de emojis NeuroMood (10 niveles)
 * Diseñados a mano en SVG, mismo lenguaje visual para light y dark.
 * Cada nivel tiene su color, forma de boca y cejas/lágrimas/destellos.
 * Estilo: blob gradient 3D minimal con expresión sutil.
 */

// Paleta por nivel (1 = peor, 10 = mejor). Gradient suave inner-outer.
const MOOD_PALETTE = {
  1:  { from: "#5b6cb8", to: "#3a4585", glow: "#5b6cb8", name: "Devastada" },     // azul oscuro
  2:  { from: "#6c84d6", to: "#445a9e", glow: "#6c84d6", name: "Muy triste" },
  3:  { from: "#7ba8e6", to: "#4c7cc4", glow: "#7ba8e6", name: "Triste" },
  4:  { from: "#9eb4d8", to: "#6a87b6", glow: "#9eb4d8", name: "Decaída" },
  5:  { from: "#f5d76a", to: "#daa520", glow: "#f5d76a", name: "Neutral" },        // amarillo neutral
  6:  { from: "#aee279", to: "#7eb83a", glow: "#aee279", name: "Bien" },
  7:  { from: "#5dd6a3", to: "#1da678", glow: "#5dd6a3", name: "Contenta" },
  8:  { from: "#36cfb8", to: "#0d8f7f", glow: "#36cfb8", name: "Feliz" },
  9:  { from: "#34cfd1", to: "#7a72d8", glow: "#7a72d8", name: "Muy feliz" },
  10: { from: "#a78bfa", to: "#ec4899", glow: "#c084fc", name: "Eufórica" },
};

// Cada nivel: forma de boca + features extra
function MoodFeatures({ level }) {
  // boca path para cada nivel (centrada en cx=50, cy=58)
  const mouths = {
    1:  "M 36 65 Q 50 56 64 65",       // boca muy triste (invertida)
    2:  "M 38 64 Q 50 57 62 64",
    3:  "M 40 62 Q 50 58 60 62",
    4:  "M 40 60 L 60 60",             // linea casi recta
    5:  "M 40 60 L 60 60",
    6:  "M 40 58 Q 50 63 60 58",
    7:  "M 38 56 Q 50 64 62 56",
    8:  "M 36 54 Q 50 67 64 54",
    9:  "M 35 52 Q 50 70 65 52",
    10: "M 32 50 Q 50 72 68 50",
  };
  // cejas: solo en extremos (1-3, 9-10)
  const showBrows = level <= 3 || level >= 9;
  const browAngle = level <= 3
    ? (level === 1 ? 20 : level === 2 ? 15 : 10)
    : (level === 9 ? -8 : -12);

  return (
    <>
      {/* Eyes — círculos pequeños */}
      <circle cx="38" cy="42" r="3.2" fill="#1a2236"/>
      <circle cx="62" cy="42" r="3.2" fill="#1a2236"/>
      {/* Eye highlight */}
      <circle cx="39" cy="40.5" r="1" fill="#fff" opacity=".85"/>
      <circle cx="63" cy="40.5" r="1" fill="#fff" opacity=".85"/>

      {/* Mouth */}
      <path d={mouths[level]} stroke="#1a2236" strokeWidth="3" fill="none" strokeLinecap="round"/>

      {/* Brows */}
      {showBrows && (
        <>
          <line x1="32" y1="32" x2="44" y2={32 + browAngle * 0.3}
                stroke="#1a2236" strokeWidth="2.4" strokeLinecap="round"/>
          <line x1="56" y1={32 + browAngle * 0.3} x2="68" y2="32"
                stroke="#1a2236" strokeWidth="2.4" strokeLinecap="round"/>
        </>
      )}

      {/* Teardrops for 1-2 */}
      {level === 1 && (
        <>
          <path d="M 30 48 Q 28 56 26 60 Q 24 56 26 50 Z" fill="#7da8e6" opacity=".85"/>
          <path d="M 70 48 Q 72 56 74 60 Q 76 56 74 50 Z" fill="#7da8e6" opacity=".85"/>
        </>
      )}
      {level === 2 && (
        <path d="M 30 48 Q 28 54 27 57 Q 26 54 28 50 Z" fill="#7da8e6" opacity=".7"/>
      )}

      {/* Blush for 7-10 */}
      {level >= 7 && (
        <>
          <ellipse cx="30" cy="56" rx="6" ry="3" fill="#ff7a9d" opacity={0.18 + (level - 7) * 0.06}/>
          <ellipse cx="70" cy="56" rx="6" ry="3" fill="#ff7a9d" opacity={0.18 + (level - 7) * 0.06}/>
        </>
      )}

      {/* Sparkles for 9-10 */}
      {level >= 9 && (
        <g opacity=".9">
          <path d="M 18 22 L 20 26 L 24 28 L 20 30 L 18 34 L 16 30 L 12 28 L 16 26 Z"
                fill="#fff7d0"/>
          <path d="M 78 18 L 79.5 21 L 82 22.5 L 79.5 24 L 78 27 L 76.5 24 L 74 22.5 L 76.5 21 Z"
                fill="#fff7d0"/>
        </g>
      )}
      {level === 10 && (
        <path d="M 50 12 L 51.5 16 L 55 17.5 L 51.5 19 L 50 23 L 48.5 19 L 45 17.5 L 48.5 16 Z"
              fill="#fff7d0"/>
      )}
    </>
  );
}

// NMMoodEmoji — SVG icon expressive face, sólo línea con el color del nivel
function NMMoodEmoji({ level = 5, size = 64, glow = true, isDark = false }) {
  const lv = Math.max(1, Math.min(10, level));
  const p = MOOD_PALETTE[lv];
  const id = `me${lv}${Math.random().toString(36).slice(2, 5)}`;
  // Stroke más fino, alineado al family NMIcon
  const stroke = size <= 28 ? 1.8 : size <= 48 ? 2.2 : size <= 80 ? 2.8 : 3.2;
  // Boca por nivel (centrada en cx=50, cy=58)
  const mouths = {
    1:  "M 32 67 Q 50 56 68 67",
    2:  "M 36 65 Q 50 57 64 65",
    3:  "M 38 62 Q 50 58 62 62",
    4:  "M 40 60 L 60 60",
    5:  "M 40 60 L 60 60",
    6:  "M 40 58 Q 50 63 60 58",
    7:  "M 36 56 Q 50 65 64 56",
    8:  "M 34 54 Q 50 68 66 54",
    9:  "M 32 52 Q 50 71 68 52",
    10: "M 30 50 Q 50 73 70 50",
  };
  const showBrows = lv <= 3 || lv >= 9;
  const browAngle = lv <= 3 ? (lv === 1 ? 18 : lv === 2 ? 14 : 10) : (lv === 9 ? -8 : -12);
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" style={{ display: "block" }}>
      <defs>
        {glow && (
          <filter id={`${id}-glow`} x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>

        )}
      </defs>
      {/* Outer halo */}
      {glow && (
        <circle cx="50" cy="50" r="46" fill={p.glow} opacity={isDark ? ".22" : ".15"}
                filter={`url(#${id}-glow)`}/>
      )}
      {/* Body line circle — más fino, sin fill */}
      <circle cx="50" cy="50" r="40" fill="none" stroke={p.to} strokeWidth={stroke}/>
      {/* Eyes */}
      <circle cx="38" cy="42" r={stroke * 0.85} fill={p.to}/>
      <circle cx="62" cy="42" r={stroke * 0.85} fill={p.to}/>
      {/* Mouth */}
      <path d={mouths[lv]} stroke={p.to} strokeWidth={stroke * 0.85} fill="none" strokeLinecap="round"/>
      {/* Brows */}
      {showBrows && (
        <>
          <line x1="32" y1="32" x2="44" y2={32 + browAngle * 0.3}
                stroke={p.to} strokeWidth={stroke * 0.75} strokeLinecap="round"/>
          <line x1="56" y1={32 + browAngle * 0.3} x2="68" y2="32"
                stroke={p.to} strokeWidth={stroke * 0.75} strokeLinecap="round"/>
        </>
      )}
      {/* Teardrops for 1-2 */}
      {lv === 1 && (
        <>
          <path d="M 28 50 Q 26 58 24 62 Q 22 58 24 52 Z" fill={p.from} stroke={p.to} strokeWidth={stroke * 0.55} strokeLinejoin="round"/>
          <path d="M 72 50 Q 74 58 76 62 Q 78 58 76 52 Z" fill={p.from} stroke={p.to} strokeWidth={stroke * 0.55} strokeLinejoin="round"/>
        </>
      )}
      {lv === 2 && (
        <path d="M 28 50 Q 26 56 25 59 Q 24 56 26 52 Z" fill={p.from} stroke={p.to} strokeWidth={stroke * 0.55} strokeLinejoin="round"/>
      )}
      {/* Blush */}
      {lv >= 7 && (
        <>
          <circle cx="28" cy="58" r="3.5" fill={p.from} opacity={0.5 + (lv - 7) * 0.1}/>
          <circle cx="72" cy="58" r="3.5" fill={p.from} opacity={0.5 + (lv - 7) * 0.1}/>
        </>
      )}
      {/* Sparkles for 9-10 */}
      {lv >= 9 && (
        <g>

// ── V3MoodSlider: slashbar 1-10 con emoji dinámico ────────────────────────────
function V3MoodSlider({ initial = 7 }) {
  const { c, isDark } = useV3Theme();
  const [level, setLevel] = React.useState(initial);
  const lvColor = moodColor(level);
  return (
    <div>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 22 }}>
        <div>
          <div style={{ fontSize: 18, fontWeight: 700, color: c.text }}>¿Cómo te sientes hoy?</div>
          <div style={{ fontSize: 12, color: c.text2, marginTop: 4 }}>Deslizá para encontrar el número que mejor describe tu estado.</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 11, color: c.text3, fontWeight: 600, letterSpacing: ".05em" }}>HOY</div>
            <div style={{ fontSize: 28, fontWeight: 700, color: lvColor, lineHeight: 1, letterSpacing: "-.02em" }}>
              {moodLabel(level)}
            </div>
            <div style={{ fontSize: 12, fontFamily: V3_FONT.mono, color: c.text2, marginTop: 2 }}>{level}/10</div>
          </div>
          <div style={{
            position: "relative",
            filter: `drop-shadow(0 8px 24px ${lvColor}55)`,
            transition: "filter .3s ease",
          }}>
            <NMMoodEmoji level={level} size={104} glow isDark={isDark}/>
          </div>
        </div>
      </div>

      {/* Slashbar */}
      <div style={{ padding: "0 14px" }}>
        {/* Track */}
        <div style={{ position: "relative", height: 56 }}>
          {/* Background bar with gradient */}
          <div style={{
            position: "absolute",
            top: 24, left: 0, right: 0, height: 8,
            borderRadius: 999,
            background: `linear-gradient(90deg, #5b6cb8 0%, #7ba8e6 22%, #f5d76a 50%, #5dd6a3 70%, #36cfb8 80%, #a78bfa 95%, #ec4899 100%)`,
            opacity: .85,
          }}/>
          {/* Tick marks */}
          {Array.from({length: 10}, (_, i) => i + 1).map(n => {
            const pct = ((n - 1) / 9) * 100;
            const isActive = n === level;
            return (
              <div key={n}
                   onClick={() => setLevel(n)}
                   style={{
                     position: "absolute", top: 12, left: `calc(${pct}% - 16px)`,
                     width: 32, height: 32, borderRadius: 999,
                     cursor: "pointer",
                     display: "flex", alignItems: "center", justifyContent: "center",
                   }}>
                <div style={{
                  width: isActive ? 16 : 6, height: isActive ? 16 : 6,
                  borderRadius: 999,
                  background: isActive ? "#fff" : "rgba(255,255,255,.7)",
                  border: isActive ? `3px solid ${lvColor}` : "none",
                  boxShadow: isActive ? `0 0 0 4px ${lvColor}33, 0 4px 12px ${lvColor}66` : "0 1px 2px rgba(0,0,0,.15)",
                  transition: "all .25s ease",
                }}/>
              </div>
            );
          })}
        </div>
        {/* Number labels */}
        <div style={{ display: "flex", justifyContent: "space-between", padding: "0 0px", marginTop: 4 }}>
          {Array.from({length: 10}, (_, i) => i + 1).map(n => (
            <div key={n}
                 onClick={() => setLevel(n)}
                 style={{
                   width: 24, textAlign: "center", cursor: "pointer",
                   fontSize: 11,
                   fontWeight: n === level ? 700 : 500,
                   color: n === level ? lvColor : c.text3,
                   fontFamily: V3_FONT.mono,
                   transition: "color .2s ease",
                 }}>{n}</div>
          ))}
        </div>
        {/* Range descriptors */}
        <div style={{
          display: "grid", gridTemplateColumns: "1fr 1fr 1fr",
          marginTop: 18, fontSize: 11, color: c.text3, fontWeight: 600,
        }}>
          <span>Necesito apoyo</span>
          <span style={{ textAlign: "center" }}>En el medio</span>
          <span style={{ textAlign: "right" }}>Me siento pleno</span>
        </div>
      </div>

      {/* Mini-row de los 10 emojis preview */}
      <div style={{
        display: "flex", justifyContent: "space-between",
        marginTop: 26, padding: "16px 14px",
        borderRadius: 14,
        background: c.elevated,
        border: `1px solid ${c.borderSoft}`,
      }}>
        {Array.from({length: 10}, (_, i) => i + 1).map(n => (
          <div key={n}
               onClick={() => setLevel(n)}
               style={{
                 display: "flex", flexDirection: "column", alignItems: "center",
                 cursor: "pointer", opacity: n === level ? 1 : .55,
                 transform: n === level ? "scale(1.18)" : "scale(1)",
                 transition: "all .25s ease",
               }}>
            <NMMoodEmoji level={n} size={n === level ? 38 : 32} glow={n === level} isDark={isDark}/>
            <div style={{
              fontSize: 9, color: n === level ? moodColor(n) : c.text4,
              fontWeight: n === level ? 700 : 500, marginTop: 4,
              fontFamily: V3_FONT.mono,
            }}>{n}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

<script type="text/babel">

// Fondo neutro acorde al tema, borde sutil, sombra suave, ícono play/pause minimal.
// Cuando se le pasa `color`, el play se rellena de ese color (para gradient bg context).
function NMPlayButton({ icon = "play", size = 56, onClick, color = null }) {
  const { c, isDark } = useV3Theme();
  const fg = color || c.text;
  // En contexto con fondo gradient (player de actividades), permitimos override de fondo
  const useNeutralBg = !color || color === c.text;
  return (
    <button onClick={onClick} style={{
      width: size, height: size,
      borderRadius: 999,
      background: useNeutralBg
        ? (isDark ? "rgba(30, 41, 65, .85)" : "#ffffff")
        : "rgba(255,255,255,.18)",
      border: `1px solid ${
        useNeutralBg
          ? (isDark ? "rgba(94,234,212,.20)" : "rgba(15,23,42,.08)")
          : "rgba(255,255,255,.3)"
      }`,
      boxShadow: isDark
        ? "0 0 0 4px rgba(94,234,212,.06), 0 8px 18px -6px rgba(0,0,0,.5)"
        : "0 1px 2px rgba(15,23,42,.08), 0 6px 14px -4px rgba(15,23,42,.10)",
      display: "flex",
      alignItems: "center",
      justifyContent: "center",
      cursor: "pointer",
      color: fg,
      transition: "all .2s ease",
      padding: 0,
    }}>
      <div style={{ marginLeft: icon === "play" ? size * 0.04 : 0, display: "inline-flex" }}>
        <NMIcon name={icon} size={Math.round(size * 0.42)} color={fg} filled/>
      </div>
    </button>
  );
}

// ── NMRingWithPlay: combina ring grande + play button centrado ───────────────
// Helper para usar en pantallas con sesión (respiración, timer, mini-sesión).
function NMRingWithPlay({ pct = 65, size = 200, stroke = null, ringTone = "gradient",
                          playIcon = "play", onPlay, label = null, sublabel = null }) {
  const { c, isDark } = useV3Theme();
  const strokeW = stroke || Math.max(6, Math.round(size / 24));
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <V3Ring pct={pct} size={size} stroke={strokeW}/>
      {/* Play button centered */}
      <div style={{
        position: "absolute", inset: 0,
        display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        gap: 6,
      }}>
        <NMPlayButton icon={playIcon} size={Math.round(size * 0.32)} onClick={onPlay}/>
        {label && (
          <div style={{ fontSize: 11, fontWeight: 600, color: c.text2, marginTop: 4 }}>{label}</div>
        )}
        {sublabel && (
          <div style={{ fontSize: 10, color: c.text3 }}>{sublabel}</div>
        )}
      </div>
    </div>
  );
}

Object.assign(window, { NMLogoNeural, NMPlayButton, NMRingWithPlay });

</script>

function V3RutinaBody({ mode }) {
  const { c, isDark } = useV3Theme();

                    background: sec.color + "22", color: sec.color,
                    display: "flex", alignItems: "center", justifyContent: "center",

                    <NMIcon name={sec.icon} size={18} color={sec.color}/>
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 15, fontWeight: 700, color: c.text }}>{sec.title}</div>
                    <div style={{ fontSize: 11, color: c.text3 }}>{secDone} de {sec.items.length} tareas</div>
                  </div>
                  <V3Ring pct={(secDone/sec.items.length)*100} size={36} stroke={4}/>

                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>

// Helper: checkbox SVG bonito
function NMCheckBox({ checked, color }) {
  const { c } = useV3Theme();
  return (
    <div style={{

// Helper: field con label
function NMField({ label, value, mono = false, select = false }) {
  const { c } = useV3Theme();
  return (
    <div>
      <div style={{ fontSize: 11, color: c.text3, fontWeight: 600, marginBottom: 6 }}>{label}</div>
      <div style={{
        display: "flex", alignItems: "center",
        padding: "10px 14px", borderRadius: 12,
        background: c.surface, border: `1px solid ${c.border}`,
        fontSize: 13, color: c.text,
        fontFamily: mono ? V3_FONT.mono : V3_FONT.sans,
        fontWeight: 500,
      }}>
        <span style={{ flex: 1 }}>{value}</span>
        {select && <NMIcon name="chevronDown" size={12} color={c.text3}/>}
      </div>
    </div>
  );
}

          subtitle="Wizard destructivo de 3 pasos. Dark theme por defecto.">
          <DCArtboard id="u-0" label="01 · Confirmar"   width={760} height={620}><V3UninstConfirmar/></DCArtboard>
          <DCArtboard id="u-1" label="02 · Eliminando"  width={760} height={620}><V3UninstEliminando/></DCArtboard>
          <DCArtboard id="u-2" label="03 · Finalizado"  width={760} height={620}><V3UninstFinalizado/></DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Tema global">
          <TweakRadio
            label="Modo por defecto"
            value={mode}
            options={["light", "dark"]}
            onChange={v => setTweak("mode", v)}
          />
        </TweakSection>
      </TweaksPanel>
    </ThemeProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
</html>
