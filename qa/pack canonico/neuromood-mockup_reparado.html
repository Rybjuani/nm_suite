<!DOCTYPE html>
<html lang="es" data-theme="light" data-product="suite">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NeuroMood · Mockup interactivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   NeuroMood — design tokens
   Light: cream / forest / terracotta  ·  Dark: ink / mint / lavender
   ============================================================ */
:root{
  --font-display:"Fraunces", Georgia, "Times New Roman", serif;
  --font-body:"Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

  --r-xs:8px; --r-sm:12px; --r-md:16px; --r-lg:22px; --r-xl:28px; --r-pill:999px;
  --t-fast:140ms cubic-bezier(.4,0,.2,1);
  --t:240ms cubic-bezier(.32,.72,.24,1);
  --t-slow:480ms cubic-bezier(.32,.72,.24,1);
}

/* ---- Light theme ---- */
[data-theme="light"]{
  --bg:#E9E3D6; --bg-grad-a:#EEE9DD; --bg-grad-b:#E3DCCB;
  --surface:#FBF8F1; --surface-2:#F3EFE4; --surface-3:#ECE6D8;
  --ink:#312D27; --ink-2:#6B6457; --ink-3:#9A9382;
  --line:rgba(49,45,39,.10); --line-2:rgba(49,45,39,.06);
  --shadow-1:0 1px 2px rgba(49,45,39,.05), 0 2px 6px rgba(49,45,39,.04);
  --shadow-2:0 2px 8px rgba(49,45,39,.06), 0 10px 28px rgba(49,45,39,.07);
  --shadow-3:0 8px 18px rgba(49,45,39,.10), 0 30px 60px rgba(49,45,39,.12);

  --brand:#2E5D43; --brand-strong:#244C37; --brand-ink:#F7F3EA;
  --brand-soft:rgba(46,93,67,.13); --brand-line:rgba(46,93,67,.28);
  --accent:#B0683B; --accent-soft:rgba(176,104,59,.15);
  --gold:#C2912F; --gold-soft:rgba(194,145,47,.16);
  --rose:#B24E3D; --rose-soft:rgba(178,78,61,.14);
  --mind:#3C8A6B; --toler:#C25A45; --regul:#CC8F2C; --efect:#2E5D43;

  --ring-track:rgba(49,45,39,.10);
  --focus:rgba(46,93,67,.45);
  --chrome:#E5DED0; --chrome-line:rgba(49,45,39,.10);
}

/* ---- Dark theme ---- */
[data-theme="dark"]{
  --bg:#0E121C; --bg-grad-a:#121726; --bg-grad-b:#0B0E18;
  --surface:#191F2E; --surface-2:#212838; --surface-3:#283047;
  --ink:#E8EAF1; --ink-2:#A7AEC1; --ink-3:#727A90;
  --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.05);
  --shadow-1:0 1px 2px rgba(0,0,0,.4);
  --shadow-2:0 4px 12px rgba(0,0,0,.4), 0 12px 32px rgba(0,0,0,.35);
  --shadow-3:0 10px 24px rgba(0,0,0,.5), 0 30px 70px rgba(0,0,0,.55);

  --brand:#56D9A6; --brand-strong:#3FC592; --brand-ink:#06140D;
  --brand-soft:rgba(86,217,166,.14); --brand-line:rgba(86,217,166,.34);
  --accent:#E0996A; --accent-soft:rgba(224,153,106,.16);
  --gold:#E3B765; --gold-soft:rgba(227,183,101,.16);
  --rose:#F09182; --rose-soft:rgba(240,145,130,.16);
  --mind:#5FE0B2; --toler:#FF9082; --regul:#E9BC66; --efect:#7CC6F0;

  --ring-track:rgba(255,255,255,.10);
  --focus:rgba(86,217,166,.5);
  --chrome:#141A28; --chrome-line:rgba(255,255,255,.07);
}

*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0; font-family:var(--font-body); color:var(--ink);
  background:
    radial-gradient(1200px 800px at 80% -10%, var(--bg-grad-a), transparent 60%),
    radial-gradient(1000px 700px at -10% 110%, var(--bg-grad-b), transparent 55%),
    var(--bg);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  transition:background var(--t-slow), color var(--t);
  overflow:hidden;
}
::selection{background:var(--brand-soft);}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
input{font-family:inherit;}
:focus-visible{outline:2px solid var(--focus); outline-offset:2px; border-radius:6px;}

/* ============================================================
   App layout : navigator rail + stage
   ============================================================ */
.app{display:grid; grid-template-columns:300px 1fr; height:100vh;}

/* ---- Navigator ---- */
.nav{
  display:flex; flex-direction:column; min-height:0;
  background:linear-gradient(180deg, var(--surface) 0%, var(--surface-2) 100%);
  border-right:1px solid var(--line);
  box-shadow:var(--shadow-1);
}
.nav__brand{padding:20px 20px 14px; display:flex; align-items:center; gap:11px;}
.brandmark{
  width:34px; height:34px; border-radius:10px; flex:none;
  background:linear-gradient(140deg, var(--brand), var(--accent));
  display:grid; place-items:center; color:#fff; box-shadow:var(--shadow-1);
}
.brandmark svg{width:20px; height:20px;}
.brand__name{font-family:var(--font-display); font-weight:600; font-size:17px; letter-spacing:-.01em; line-height:1;}
.brand__name b{color:var(--brand); font-weight:600;}
.brand__sub{font-size:11px; color:var(--ink-3); margin-top:3px; letter-spacing:.06em; text-transform:uppercase;}

.seg{display:flex; gap:4px; margin:4px 16px 12px; padding:4px; background:var(--surface-3);
  border-radius:var(--r-pill); border:1px solid var(--line-2);}
.seg button{flex:1; padding:7px 0; font-size:12.5px; font-weight:600; color:var(--ink-2);
  border-radius:var(--r-pill); transition:all var(--t-fast); letter-spacing:.01em;}
.seg button[aria-pressed="true"]{background:var(--surface); color:var(--ink);
  box-shadow:var(--shadow-1);}

.nav__search{margin:0 16px 8px; position:relative;}
.nav__search svg{position:absolute; left:12px; top:50%; transform:translateY(-50%);
  width:15px; height:15px; color:var(--ink-3); pointer-events:none;}
.nav__search input{width:100%; padding:9px 12px 9px 34px; font-size:13px; color:var(--ink);
  background:var(--surface-3); border:1px solid var(--line); border-radius:var(--r-pill);
  transition:border var(--t-fast), box-shadow var(--t-fast);}
.nav__search input::placeholder{color:var(--ink-3);}
.nav__search input:focus{outline:none; border-color:var(--brand-line); box-shadow:0 0 0 3px var(--brand-soft);}

.nav__list{flex:1; overflow-y:auto; padding:4px 12px 20px; scrollbar-width:thin;}
.nav__list::-webkit-scrollbar{width:8px;}
.nav__list::-webkit-scrollbar-thumb{background:var(--line); border-radius:99px; border:2px solid transparent; background-clip:padding-box;}
.nav__group{margin-top:14px;}
.nav__group-h{display:flex; align-items:center; gap:8px; padding:4px 10px; margin-bottom:2px;}
.nav__group-h span{font-size:10.5px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-3);}
.nav__group-h hr{flex:1; border:none; border-top:1px solid var(--line-2);}
.nav__item{display:flex; align-items:center; gap:10px; width:100%; text-align:left;
  padding:8px 10px; border-radius:var(--r-sm); font-size:13.5px; color:var(--ink-2);
  transition:background var(--t-fast), color var(--t-fast); position:relative; font-weight:450;}
.nav__item:hover{background:var(--surface-3); color:var(--ink);}
.nav__item.is-active{background:var(--brand-soft); color:var(--brand); font-weight:600;}
[data-theme="dark"] .nav__item.is-active{color:var(--ink);}
.nav__item.is-active::before{content:""; position:absolute; left:-12px; top:50%; transform:translateY(-50%);
  width:3px; height:18px; border-radius:3px; background:var(--brand);}
.nav__item .ic{width:17px; height:17px; flex:none; opacity:.85;}
.nav__item .lbl{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.nav__item .tag{font-size:9.5px; font-weight:700; padding:1px 6px; border-radius:99px;
  background:var(--surface-3); color:var(--ink-3); letter-spacing:.03em;}
.nav__item.is-active .tag{background:rgba(255,255,255,.4); color:var(--brand);}
[data-theme="dark"] .nav__item.is-active .tag{background:rgba(255,255,255,.12); color:var(--ink-2);}

.nav__foot{padding:12px 16px; border-top:1px solid var(--line); display:flex; align-items:center; gap:10px;}
.themetoggle{flex:1; display:flex; align-items:center; gap:9px; padding:9px 12px; border-radius:var(--r-pill);
  background:var(--surface-3); border:1px solid var(--line); font-size:12.5px; font-weight:500; color:var(--ink-2);
  transition:all var(--t-fast);}
.themetoggle:hover{color:var(--ink); border-color:var(--brand-line);}
.themetoggle svg{width:16px; height:16px;}
.themetoggle .dot{margin-left:auto; width:34px; height:18px; border-radius:99px; background:var(--line);
  position:relative; transition:background var(--t);}
.themetoggle .dot::after{content:""; position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:50%;
  background:var(--surface); box-shadow:var(--shadow-1); transition:transform var(--t);}
[data-theme="dark"] .themetoggle .dot{background:var(--brand);}
[data-theme="dark"] .themetoggle .dot::after{transform:translateX(16px);}

/* ============================================================
   Stage + device window
   ============================================================ */
.stage{position:relative; min-width:0; display:flex; flex-direction:column;
  padding:26px 30px; overflow:auto;}
.stage__top{display:flex; align-items:flex-end; gap:16px; margin-bottom:18px; flex-wrap:wrap;}
.stage__title{font-family:var(--font-display); font-size:23px; font-weight:600; letter-spacing:-.015em; line-height:1.1;}
.stage__desc{font-size:13px; color:var(--ink-2); margin-top:5px; max-width:60ch;}
.stage__meta{margin-left:auto; display:flex; gap:8px; align-items:center;}
.chip-state{display:flex; gap:4px; padding:4px; background:var(--surface-2); border:1px solid var(--line);
  border-radius:var(--r-pill); box-shadow:var(--shadow-1);}
.chip-state button{padding:6px 13px; font-size:12px; font-weight:600; color:var(--ink-2);
  border-radius:var(--r-pill); transition:all var(--t-fast); white-space:nowrap;}
.chip-state button[aria-pressed="true"]{background:var(--brand); color:var(--brand-ink); box-shadow:var(--shadow-1);}

.window{
  width:960px; height:600px; margin:0 auto; background:var(--surface);
  border:1px solid var(--line); border-radius:var(--r-xl); overflow:hidden;
  box-shadow:var(--shadow-3); animation:winIn var(--t-slow) both;
  display:flex; flex-direction:column;
  container-type:inline-size;
}
.window.narrow{width:520px; height:600px;}
@keyframes winIn{from{opacity:0; transform:translateY(10px) scale(.992);} to{opacity:1; transform:none;}}

.titlebar{display:flex; align-items:center; gap:10px; padding:11px 16px;
  background:var(--chrome); border-bottom:1px solid var(--chrome-line);}
.titlebar .back{width:26px; height:26px; border-radius:8px; display:grid; place-items:center; color:var(--ink-2); transition:background var(--t-fast);}
.titlebar .back:hover{background:var(--surface-3);}
.titlebar .tb-ic{width:18px; height:18px; opacity:.9; color:var(--accent);}
.titlebar .tb-title{font-size:13.5px; font-weight:600; letter-spacing:-.01em;}
.titlebar .tb-crumb{font-size:13px; color:var(--ink-3);}
.titlebar .tb-right{margin-left:auto; display:flex; align-items:center; gap:14px;}
.tb-dot{width:13px; height:13px; border-radius:50%; opacity:.55; transition:opacity var(--t-fast);}
.tb-dot:hover{opacity:1;}
.tb-dots{display:flex; gap:8px;}
.tb-dot.r{background:#E0695A;} .tb-dot.y{background:#E0B23E;} .tb-dot.g{background:#56B27A;}
.tb-theme{width:24px; height:24px; border-radius:7px; display:grid; place-items:center; color:var(--ink-3); transition:all var(--t-fast);}
.tb-theme:hover{color:var(--ink); background:var(--surface-3);}

/* range slider */
input[type=range]{-webkit-appearance:none; appearance:none; height:8px; border-radius:99px;
  background:linear-gradient(90deg,#7b8a99,#6b8fa8,#5faa86,#86b15f,#c99a3d,#b24e3d); outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:22px; height:22px; border-radius:50%;
  background:var(--surface); border:3px solid var(--brand); box-shadow:var(--shadow-2); cursor:pointer; transition:transform var(--t-fast);}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.12);}
input[type=range]::-moz-range-thumb{width:20px; height:20px; border-radius:50%; background:var(--surface); border:3px solid var(--brand); cursor:pointer;}

/* breathing / timer ring */
.bigring{width:230px; height:230px; border-radius:50%; position:relative; display:grid; place-items:center; margin:0 auto;
  background:radial-gradient(circle at 50% 40%, var(--brand-soft), transparent 72%);}
.bigring .core{width:200px; height:200px; border-radius:50%;
  background:radial-gradient(circle at 50% 38%, var(--surface) 0%, var(--surface-2) 70%);
  border:1px solid var(--line); box-shadow:inset 0 2px 10px rgba(0,0,0,.04), var(--shadow-2);
  display:grid; place-items:center; transition:transform 1s cubic-bezier(.4,0,.2,1);}
.bigring .num{font-family:var(--font-display); font-size:52px; font-weight:500; line-height:1;}
.bigring .ph{font-size:13px; color:var(--ink-2); margin-top:8px; letter-spacing:.04em;}
.ctl{width:46px; height:46px; border-radius:50%; display:grid; place-items:center; background:var(--surface);
  border:1px solid var(--line); box-shadow:var(--shadow-1); color:var(--ink-2); transition:all var(--t-fast);}
.ctl:hover{border-color:var(--brand-line); color:var(--ink); transform:translateY(-1px);}
.ctl.main{width:58px; height:58px; background:var(--brand); color:var(--brand-ink); border-color:transparent;}
.ctl.main:hover{background:var(--brand-strong);}

/* routine checkbox */
.rt-cb{width:22px; height:22px; border-radius:7px; border:2px solid var(--line); flex:none; display:grid; place-items:center;
  color:var(--brand-ink); background:var(--surface); transition:all var(--t-fast);}
.rt-cb.on{background:var(--brand); border-color:var(--brand);}
.rt-row:hover{background:var(--surface-2);}

/* dbt skill card */
.dbt-card{position:relative; overflow:hidden;}
.dbt-card .bar{height:7px; width:64px; border-radius:99px; margin-bottom:14px;}
.dbt-card .meta{display:flex; align-items:center; gap:14px; margin-top:14px; font-size:12.5px; color:var(--ink-3);}
.dbt-card .meta .pl{color:var(--brand); font-weight:600; display:inline-flex; align-items:center; gap:5px; cursor:pointer;}
.need-card{border-left:3px solid var(--brand); cursor:pointer;}

/* stepper */
.stepper{display:flex; align-items:center; justify-content:space-between; max-width:620px; margin:8px auto 28px; position:relative;}
.stepper .line{position:absolute; left:8%; right:8%; top:9px; height:2px; background:var(--line);}
.stepper .line .fill{height:100%; background:var(--brand); transition:width var(--t-slow);}
.stepper .stp{display:flex; flex-direction:column; align-items:center; gap:8px; position:relative; z-index:1;}
.stepper .stp i{width:18px; height:18px; border-radius:50%; background:var(--surface-3); border:2px solid var(--line); transition:all var(--t);}
.stepper .stp.done i,.stepper .stp.active i{background:var(--brand); border-color:var(--brand);}
.stepper .stp span{font-size:12px; color:var(--ink-3); font-weight:500;}
.stepper .stp.active span{color:var(--ink); font-weight:600;}

/* patient row */
.prow{display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:var(--r-md); transition:background var(--t-fast); cursor:pointer; border:1px solid transparent;}
.prow:hover{background:var(--surface-2); border-color:var(--line);}
.avatar{width:40px; height:40px; border-radius:12px; flex:none; display:grid; place-items:center; font-weight:700; font-size:13.5px; color:#fff;}

.screen-frame{
  flex:1 1 auto; min-height:0; overflow:hidden; position:relative;
  background:radial-gradient(900px 500px at 50% -20%, var(--surface-2), transparent 70%);
}
.screen{
  padding:24px;
  transform-origin:top left; will-change:transform;
  animation:scrnIn var(--t) both;
}
/* When a .screen lives inside a .screen-frame (i.e. inside a device window), it is
   absolutely positioned so it can be responsively scaled to fit without scroll. */
.screen-frame > .screen{
  position:absolute; top:0; left:0; width:100%;
  background:radial-gradient(900px 500px at 50% -20%, var(--surface-2), transparent 70%);
}
@keyframes scrnIn{from{opacity:0;} to{opacity:1;}}

/* ============================================================
   Reusable primitives
   ============================================================ */
.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg);
  box-shadow:var(--shadow-1); transition:transform var(--t), box-shadow var(--t), border-color var(--t);}
.card.pad{padding:20px;}
.card.hov:hover{transform:translateY(-3px); box-shadow:var(--shadow-2); border-color:var(--brand-line);}

.eyebrow{font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3);}
.h-serif{font-family:var(--font-display); font-weight:600; letter-spacing:-.015em;}

.badge{display:inline-flex; align-items:center; gap:5px; padding:4px 11px; border-radius:var(--r-pill);
  font-size:11.5px; font-weight:600; letter-spacing:.01em; background:var(--surface-3); color:var(--ink-2);}
.badge.brand{background:var(--brand-soft); color:var(--brand);}
.badge.accent{background:var(--accent-soft); color:var(--accent);}
.badge.gold{background:var(--gold-soft); color:var(--gold);}
.badge.rose{background:var(--rose-soft); color:var(--rose);}
.badge .dt{width:6px; height:6px; border-radius:50%; background:currentColor;}
[data-theme="dark"] .badge.brand{color:var(--mind);}

.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:11px 20px;
  border-radius:var(--r-pill); font-size:13.5px; font-weight:600; letter-spacing:.005em;
  transition:transform var(--t-fast), box-shadow var(--t-fast), background var(--t-fast), border-color var(--t-fast);
  border:1px solid transparent;}
.btn:active{transform:translateY(1px) scale(.99);}
.btn--primary{background:var(--brand); color:var(--brand-ink); box-shadow:var(--shadow-1);}
.btn--primary:hover{background:var(--brand-strong); box-shadow:var(--shadow-2);}
.btn--ghost{background:var(--surface); border-color:var(--line); color:var(--ink);}
.btn--ghost:hover{border-color:var(--brand-line); background:var(--surface-2);}
.btn--soft{background:var(--brand-soft); color:var(--brand);}
.btn--soft:hover{background:var(--brand-line); color:var(--brand-ink);}
.btn:disabled{opacity:.5; cursor:not-allowed; transform:none;}

.input{width:100%; padding:12px 14px; font-size:13.5px; color:var(--ink); background:var(--surface-2);
  border:1px solid var(--line); border-radius:var(--r-md); transition:border var(--t-fast), box-shadow var(--t-fast);}
.input::placeholder{color:var(--ink-3);}
.input:focus{outline:none; border-color:var(--brand-line); box-shadow:0 0 0 3px var(--brand-soft);}
textarea.input{resize:none; line-height:1.55;}
.field-lbl{font-size:12.5px; font-weight:600; color:var(--ink); margin-bottom:7px; display:block;}
.field-lbl span{color:var(--ink-3); font-weight:450;}

.tabs{display:flex; gap:4px; padding:5px; background:var(--surface-2); border:1px solid var(--line);
  border-radius:var(--r-pill);}
.tabs button{padding:8px 16px; font-size:13px; font-weight:600; color:var(--ink-2); border-radius:var(--r-pill);
  transition:all var(--t-fast); white-space:nowrap;}
.tabs button[aria-selected="true"]{background:var(--brand); color:var(--brand-ink); box-shadow:var(--shadow-1);}

.fchip{padding:8px 15px; font-size:12.5px; font-weight:600; color:var(--ink-2); border-radius:var(--r-pill);
  background:var(--surface-2); border:1px solid var(--line); transition:all var(--t-fast);}
.fchip:hover{border-color:var(--brand-line); color:var(--ink);}
.fchip[aria-pressed="true"]{background:var(--brand); color:var(--brand-ink); border-color:transparent;}

.empty{display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
  padding:50px 24px; gap:10px;}
.empty .ico{width:64px; height:64px; border-radius:18px; display:grid; place-items:center;
  background:var(--brand-soft); color:var(--brand); margin-bottom:6px;}
.empty .ico svg{width:30px; height:30px;}
.empty h3{font-family:var(--font-display); font-size:20px; font-weight:600; margin:0;}
.empty p{font-size:13.5px; color:var(--ink-2); margin:0; max-width:34ch; line-height:1.5;}

.grid{display:grid; gap:14px;}
.cols-2{grid-template-columns:1fr 1fr;}
.cols-3{grid-template-columns:repeat(3,1fr);}
.cols-4{grid-template-columns:repeat(4,1fr);}
@container (max-width:880px){.cols-4{grid-template-columns:1fr 1fr;} .cols-3{grid-template-columns:1fr 1fr;}}

/* progress ring */
.ring{--p:0; --sz:54px; --tk:6px; width:var(--sz); height:var(--sz); border-radius:50%; flex:none;
  background:conic-gradient(var(--brand) calc(var(--p)*1%), var(--ring-track) 0);
  display:grid; place-items:center; transition:background var(--t-slow);}
.ring::before{content:""; position:absolute; width:calc(var(--sz) - var(--tk)*2); height:calc(var(--sz) - var(--tk)*2);
  border-radius:50%; background:var(--surface);}
.ring{position:relative;}
.ring span{position:relative; font-size:12px; font-weight:700; color:var(--brand);}

.dots{display:flex; gap:5px;}
.dots i{width:8px; height:8px; border-radius:50%; background:var(--line); transition:background var(--t-fast);}
.dots i.on{background:var(--brand);}
.dots i.miss{background:var(--rose);}

/* toast */
.toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0;
  background:var(--ink); color:var(--surface); padding:12px 20px; border-radius:var(--r-pill);
  font-size:13px; font-weight:500; box-shadow:var(--shadow-3); z-index:60; pointer-events:none;
  transition:opacity var(--t), transform var(--t); display:flex; gap:9px; align-items:center;}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* modal */
.modal-bg{position:fixed; inset:0; background:rgba(20,18,14,.5); backdrop-filter:blur(3px);
  display:grid; place-items:center; z-index:50; opacity:0; pointer-events:none; transition:opacity var(--t);}
.modal-bg.show{opacity:1; pointer-events:auto;}
.modal{width:min(560px,92vw); max-height:90vh; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-xl);
  box-shadow:var(--shadow-3); transform:scale(.96); transition:transform var(--t); overflow:hidden;
  display:flex; flex-direction:column; container-type:inline-size;}
.modal-bg.show .modal{transform:none;}
.modal.dbt-practice{width:560px; height:auto; min-height:356px; border-radius:28px;}
.modal.ia-summary{width:720px; max-width:96vw; height:auto; border-radius:24px;

.ia-sum-header{display:flex; align-items:center; gap:14px; padding:18px 22px 14px; border-bottom:1px solid var(--line);}
.ia-sum-header .ia-avatar{width:40px; height:40px; border-radius:12px; display:grid; place-items:center;
  background:color-mix(in srgb, var(--brand) 18%, transparent); color:var(--brand); flex:0 0 auto;}
.ia-sum-header .ia-titles{flex:1; min-width:0;}
.ia-sum-header .ia-eyebrow{font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-3); font-weight:600;}
.ia-sum-header .ia-title{font-size:18px; line-height:1.15; margin-top:2px;}
.ia-sum-header .ia-meta{font-size:11px; color:var(--ink-3); margin-top:2px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.ia-sum-header .ia-meta .dot{width:3px; height:3px; border-radius:50%; background:var(--ink-3);}
.ia-sum-chips{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:14px 22px 4px;}
.ia-sum-chip{background:var(--surface-2); border:1px solid var(--line); border-radius:12px; padding:9px 10px; text-align:left;}
.ia-sum-chip .v{font-size:16px; font-weight:700; color:var(--brand); line-height:1; font-variant-numeric:tabular-nums;}
.ia-sum-chip .l{font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-3); margin-top:5px; font-weight:600;}
.ia-sum-body{padding:6px 22px 4px; overflow-y:auto; max-height:248px;}
.ia-sum-sec{padding:10px 0; border-bottom:1px dashed var(--line);}
.ia-sum-sec:last-child{border-bottom:0;}
.ia-sum-sec .h{display:flex; align-items:center; gap:7px; margin-bottom:3px;}
.ia-sum-sec .h .ic{width:14px; height:14px; color:var(--brand); flex:0 0 auto;}
.ia-sum-sec .h .t{font-size:11px; letter-spacing:.10em; text-transform:uppercase; color:var(--ink-2); font-weight:700;}
.ia-sum-sec .b{font-size:12.5px; color:var(--ink-2); line-height:1.55; padding-left:21px;}
.ia-sum-footer{display:flex; align-items:center; gap:10px; padding:12px 22px 14px; border-top:1px solid var(--line);
  background:color-mix(in srgb, var(--surface-2) 50%, transparent);}
.ia-sum-footer .warn{flex:1; font-size:10.5px; color:var(--ink-3); line-height:1.4; display:flex; gap:6px; align-items:flex-start;}
.ia-sum-footer .warn .ic{width:12px; height:12px; color:var(--amber, #d97706); flex:0 0 auto; margin-top:1px;}

@media(max-width:960px){
  .app{grid-template-columns:1fr;}
  .nav{position:fixed; z-index:40; width:300px; height:100%; transform:translateX(-100%); transition:transform var(--t);}
  .nav.open{transform:none;}
  .menu-fab{position:fixed; top:16px; left:16px; z-index:30; width:42px; height:42px; border-radius:12px;
    background:var(--surface); border:1px solid var(--line); box-shadow:var(--shadow-2); display:grid; place-items:center;}
}
.menu-fab{display:none;}
@media(max-width:960px){.menu-fab{display:grid;} .stage{padding-top:70px;}}

/* ---------- HUB: patients ---------- */

<button class="menu-fab" id="menuFab" aria-label="Menú">

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

<script>
/* ============================================================================
   NeuroMood — interactive mockup engine
   ============================================================================ */
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const el = (t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const esc = s => String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

/* ---------- icon set ---------- */
const I = {
  home:'<path d="M3 10.5 12 3l9 7.5"/><path d="M5 9v11h14V9"/>',
  mood:'<circle cx="12" cy="12" r="9"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><path d="M9 9h.01M15 9h.01"/>',
  breath:'<path d="M12 3v6M12 3 9.5 5.5M12 3l2.5 2.5"/><circle cx="12" cy="14" r="6"/>',
  brain:'<path d="M9.5 3.5a3 3 0 0 0-3 3 3 3 0 0 0-1.5 5.6A3 3 0 0 0 6.5 18 3 3 0 0 0 12 19.5V4.2a3 3 0 0 0-2.5-.7Z"/><path d="M14.5 3.5a3 3 0 0 1 3 3 3 3 0 0 1 1.5 5.6A3 3 0 0 1 17.5 18 3 3 0 0 1 12 19.5"/>',
  activity:'<circle cx="12" cy="5" r="2.4"/><path d="M9 21v-6l-2-2 1-5 4 2 3 1"/><path d="m9 13 4 1 1 7"/>',
  bell:'<path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/>',
  check:'<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
  timer:'<circle cx="12" cy="13" r="8"/><path d="M12 13V9M9 2h6M19 6l-1.5 1.5"/>',
  spark:'<path d="m12 3 1.8 4.6L18 9l-4.2 1.4L12 15l-1.8-4.6L6 9l4.2-1.4z"/><path d="M5 18l.7 1.8L7.5 20l-1.8.7L5 22l-.7-1.3L2.5 20l1.8-.2z"/>',
  users:'<circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.3 2.7-5 6-5s6 1.7 6 5"/><path d="M16 6a3 3 0 0 1 0 5.6M21 20c0-2.6-1.4-4.2-3.5-4.8"/>',
  user:'<circle cx="12" cy="8" r="3.6"/><path d="M5 20c0-3.6 3-5.5 7-5.5s7 1.9 7 5.5"/>',
  text:'<path d="M5 7h14M5 12h14M5 17h9"/>',
  key:'<circle cx="8" cy="15" r="4"/><path d="m11 12 8-8 2 2-2 2 2 2-2 2-2-2-3 3"/>',
  shield:'<path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6z"/>',
  smile:'<circle cx="12" cy="12" r="9"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><path d="M9 9h.01M15 9h.01"/>',
  flower:'<circle cx="12" cy="12" r="2.5"/><path d="M12 9.5C12 7 13 5 15 5s2 3 0 4.5M12 14.5C12 17 11 19 9 19s-2-3 0-4.5M9.5 12C7 12 5 11 5 9s3-2 4.5 0M14.5 12c2.5 0 4.5 1 4.5 3s-3 2-4.5 0"/>',
  doc:'<path d="M14 3v5h5"/><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M8 13h8M8 17h6"/>',
  sun:'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>',
  moon:'<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>',
  arrow:'<path d="M19 12H5M12 19l-7-7 7-7"/>',
  bolt:'<path d="M13 2 4 14h7l-1 8 9-12h-7z"/>',
  info:'<circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/>',
};
const svg = (p,w=18,cls='')=>`<svg${cls?` class="${cls}"`:''} viewBox="0 0 24 24" width="${w}" height="${w}" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;

/* ---------- toast / modal ---------- */
let toastT;
function toast(msg){
  $('#toastMsg').textContent = msg; const t=$('#toast'); t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200);
}
function openModal(html){ $('#modal').classList.remove('dbt-practice'); $('#modal').innerHTML=html; $('#modalBg').classList.add('show'); requestAnimationFrame(fitModal); }
function closeModal(){ $('#modalBg').classList.remove('show'); $('#modal').classList.remove('dbt-practice'); $('#modal').classList.remove('ia-summary'); $('#modal').style.transform=''; $('#modal').style.transformOrigin=''; }
$('#modalBg').addEventListener('click',e=>{ if(e.target===$('#modalBg')) closeModal(); });

/* ---------- breadcrumb / titlebar builder ---------- */
function titlebar({icon,title,crumb,back}={}){
  return `<div class="titlebar">
    ${back?`<button class="back" data-back="${esc(back)}" title="Atrás">${svg(I.arrow,17)}</button>`:''}
    ${icon?`<span class="tb-ic">${svg(I[icon]||icon,18)}</span>`:''}
    <span class="tb-title">${esc(title||'')}</span>
    ${crumb?`<span class="tb-crumb">/&nbsp; ${esc(crumb)}</span>`:''}
    <div class="tb-right">
      <button class="tb-theme" data-theme-toggle title="Cambiar tema">${svg(document.documentElement.dataset.theme==='dark'?I.sun:I.moon,16)}</button>
      <div class="tb-dots"><span class="tb-dot g"></span><span class="tb-dot y"></span><span class="tb-dot r"></span></div>
    </div>
  </div>`;
}

/* progress ring helper (svg, animatable) */
function ringSVG(pct,{size=58,stroke=6,color='var(--brand)',label}={}){
  const r=(size-stroke)/2, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--ring-track)" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"
      style="transition:stroke-dashoffset .6s cubic-bezier(.32,.72,.24,1)"/>
    ${label!=null?`<text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle" transform="rotate(90 ${size/2} ${size/2})" font-size="${size*0.26}" font-weight="700" fill="${color}" font-family="var(--font-body)">${label}</text>`:''}
  </svg>`;
}

/* ============================================================================
   SCREEN REGISTRY
   Each screen: {id, group, product, title, desc, icon, narrow?, states?, render(state)}
   render returns innerHTML of .window; optional mount(root,state) wires events.
   ============================================================================ */
const SCREENS = {};
function defScreen(o){ SCREENS[o.id]=o; }

/* ===== boot state ===== */
let CURRENT='home';
let CURRENT_STATE=null;
const groupsOrder = {
  suite:['Acceso','Inicio','Bienestar','Cognitivo','Hábitos','Habilidades DBT'],
  hub:['Pacientes','Seguimiento','Configuración'],
};

/* ---------- theme ---------- */
function setTheme(t){
  document.documentElement.dataset.theme=t;
  $('#themeLabel').textContent = t==='dark'?'Tema oscuro':'Tema claro';
  $('#themeIcon').innerHTML = t==='dark'?I.moon:I.sun;
  render(); // re-render to refresh titlebar icon & charts
}
$('#themeToggle').addEventListener('click',()=>setTheme(document.documentElement.dataset.theme==='dark'?'light':'dark'));
document.addEventListener('click',e=>{
  if(e.target.closest('[data-theme-toggle]')) setTheme(document.documentElement.dataset.theme==='dark'?'light':'dark');
  const back=e.target.closest('[data-back]'); if(back) go(back.dataset.back);
});

/* ---------- product switch ---------- */
function setProduct(p){
  document.documentElement.dataset.product=p;
  $('#segSuite').setAttribute('aria-pressed', p==='suite');
  $('#segHub').setAttribute('aria-pressed', p==='hub');
  buildNav();
  const first=Object.values(SCREENS).find(s=>s.product===p);
  if(first) go(first.id);
}
$('#segSuite').addEventListener('click',()=>setProduct('suite'));
$('#segHub').addEventListener('click',()=>setProduct('hub'));

/* ---------- navigator ---------- */
function buildNav(filter=''){
  const p=document.documentElement.dataset.product;
  const list=$('#navList'); list.innerHTML='';
  const f=filter.trim().toLowerCase();
  groupsOrder[p].forEach(g=>{
    const items=Object.values(SCREENS).filter(s=>s.product===p && s.group===g
      && (!f || (s.title+' '+(s.desc||'')+' '+(s.navItems||[]).map(n=>n.label).join(' ')).toLowerCase().includes(f)));
    if(!items.length) return;
    const grp=el('div','nav__group');
    grp.appendChild(el('div','nav__group-h',`<span>${g}</span><hr>`));
    items.forEach(s=>{
      // a screen may expose multiple nav entries (state variants)
      const entries = s.navItems || [{id:s.id,label:s.title,tag:s.tag}];
      entries.forEach(ent=>{
        if(f && !((ent.label+' '+(s.desc||'')).toLowerCase().includes(f))) {
          // keep if screen matched generally
        }
        const it=el('button','nav__item');
        it.innerHTML=`<span class="ic">${svg(I[s.icon]||s.icon,17)}</span><span class="lbl">${esc(ent.label)}</span>${ent.tag?`<span class="tag">${esc(ent.tag)}</span>`:''}`;
        it.dataset.id=s.id; it.dataset.state=ent.state||'';
        if(CURRENT===s.id && (CURRENT_STATE||'')===(ent.state||'')) it.classList.add('is-active');
        it.addEventListener('click',()=>{ go(s.id, ent.state||null); if(window.innerWidth<=960) $('#nav').classList.remove('open'); });
        grp.appendChild(it);
      });
    });
    list.appendChild(grp);
  });
}
$('#navSearch').addEventListener('input',e=>buildNav(e.target.value));
$('#menuFab').addEventListener('click',()=>$('#nav').classList.toggle('open'));

/* ---------- navigation ---------- */
function go(id, state=null){
  if(!SCREENS[id]) return;
  CURRENT=id; CURRENT_STATE=state;
  render();
  buildNav($('#navSearch').value);
  $('#stage').scrollTop=0;
}

/* ---------- responsive fit (no internal scrollbars) ----------
   The window has fixed dimensions (960x600, 520x600 narrow). When a screen's
   natural content is slightly taller than the available space, we responsively
   scale the screen down via transform: scale() so it fits cleanly — instead of
   adding a scroll. We also compensate the width so the visual width still fills
   the frame horizontally. Screens whose content already fits are left untouched.
*/
const FIT_MIN = 0.55;            // never scale below this (keep usable)
const FIT_PAD  = 4;              // small bottom breathing room (px)
function fitScreen(win){
  const frame = win.querySelector('.screen-frame');
  const screen = win.querySelector('.screen');
  if(!frame || !screen) return;
  // Always reset the whole-screen transform first
  screen.style.transform='';
  screen.style.width='100%';
  screen.style.paddingBottom='';

  // Home special case: shrink the welcome card, never the 8-card grid
  const welcome = win.querySelector('[data-home-welcome]');
  if(welcome){
    fitHome(win, frame, screen, welcome);
    return;
  }

  // Force layout
  void frame.offsetHeight;
  const availH = frame.clientHeight - FIT_PAD;
  if(availH<=0) return;
  const naturalH = screen.offsetHeight;
  if(naturalH<=availH) return;       // already fits — leave as is
  const scale = Math.max(FIT_MIN, availH/naturalH);
  // Apply scale; widen so the visual width still fills the frame horizontally.
  screen.style.transform = `scale(${scale})`;
  screen.style.width = `${100/scale}%`;
}

/* Home-specific fit: keeps the 8-card grid at natural size and only shrinks
   the welcome card when the total height exceeds the available space. */
function fitHome(win, frame, screen, welcome){
  // Reset welcome card styles
  welcome.style.transform='';
  welcome.style.transformOrigin='';
  welcome.style.width='';
  welcome.style.marginBottom='';

  void frame.offsetHeight;
  const availH = frame.clientHeight - FIT_PAD;
  if(availH<=0) return;

  const naturalH = screen.offsetHeight;
  if(naturalH<=availH) return;       // everything fits, nothing to shrink

  // Measure the welcome card's natural height + margin-bottom
  const welcomeH = welcome.offsetHeight;
  const cs = getComputedStyle(welcome);
  const welcomeMarginB = parseFloat(cs.marginBottom) || 0;
  const welcomeTotal = welcomeH + welcomeMarginB;

  // How much we need to save
  const need = naturalH - availH;

  // Scale factor so that welcomeTotal * scale == welcomeTotal - need
  let scale = (welcomeTotal - need) / welcomeTotal;
  if(scale < 0.5) scale = 0.5;       // cap so it stays readable

  // Apply scale to the welcome card only (transform-origin top-left so it
  // collapses toward the top, and widen it so its visual width is preserved).
  welcome.style.transformOrigin = 'top left';
  welcome.style.transform = `scale(${scale})`;
  welcome.style.width = `${100/scale}%`;

  // transform doesn't change layout box, so we must subtract the saved height
  // from the welcome card's margin-bottom to actually reclaim the space.
  const saved = welcomeH * (1 - scale);
  welcome.style.marginBottom = `${welcomeMarginB - saved}px`;
}
function fitModal(){
  const modal=$('#modal'); if(!modal || !modal.classList.contains('show') && !$('#modalBg').classList.contains('show')) return;
  // The modal body is the .screen (or first content child). We scale the whole
  // modal if it would exceed the viewport height.
  const bg=$('#modalBg');
  if(!bg.classList.contains('show')) return;
  // Reset transform on inner content if previously applied
  modal.style.transform='';
  void modal.offsetHeight;
  const vh = window.innerHeight;
  const mh = modal.offsetHeight;
  if(mh<=vh*0.92) return;
  const scale = Math.max(FIT_MIN, (vh*0.92)/mh);
  modal.style.transform = `scale(${scale})`;
  modal.style.transformOrigin = 'center center';
}
function render(){
  const s=SCREENS[CURRENT]; if(!s) return;
  $('#sTitle').textContent=s.title;
  $('#sDesc').textContent=s.desc||'';
  // state chips in stage meta
  const meta=$('#sMeta'); meta.innerHTML='';
  if(s.states && s.states.length>1){
    const wrap=el('div','chip-state');
    s.states.forEach(st=>{
      const b=el('button',null,st.label); b.setAttribute('aria-pressed', (CURRENT_STATE||s.states[0].id)===st.id);
      b.addEventListener('click',()=>{ CURRENT_STATE=st.id; render(); buildNav($('#navSearch').value); });
      wrap.appendChild(b);
    });
    meta.appendChild(wrap);
  }
  const mount=$('#windowMount');
  const win=el('div','window'+(s.narrow?' narrow':''));
  win.innerHTML=s.render(CURRENT_STATE || (s.states?s.states[0].id:null));
  // Wrap .screen in .screen-frame so the screen can be responsively scaled to fit
  // without internal scrollbars and without breaking its internal layout.
  const scr=win.querySelector('.screen');
  if(scr){
    const frame=el('div','screen-frame');
    scr.parentNode.insertBefore(frame,scr);
    frame.appendChild(scr);
  }
  mount.innerHTML=''; mount.appendChild(win);
  if(s.mount) s.mount(win, CURRENT_STATE || (s.states?s.states[0].id:null));
  fitScreen(win);
}
</script>

      play.innerHTML=timerState.running?svg('<rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>',22):svg('<polygon points="6 4 20 12 6 20"/>',22);
      status.textContent=timerState.running?'Sesión en curso':(timerState.left<timerState.total?'En pausa':'Lista para empezar'); };
    const start=()=>{ timerState.running=true; clearInterval(timerInt); timerInt=setInterval(()=>{ if(timerState.left>0){timerState.left--; upd();} else {clearInterval(timerInt); timerState.running=false; toast('Sesión completada · '+timerState.mode); upd();} },1000); upd(); };
    play.addEventListener('click',()=>{ timerState.running?(timerState.running=false,clearInterval(timerInt),upd()):start(); });
    $('#tmReset',root).addEventListener('click',()=>{ clearInterval(timerInt); timerState.running=false; timerState.left=timerState.total; upd(); });
    $('#tmSkip',root).addEventListener('click',()=>{ clearInterval(timerInt); timerState.running=false; timerState.left=0; upd(); });
    $$('[data-min]',root).forEach(b=>b.addEventListener('click',()=>{ $$('[data-min]',root).forEach(x=>x.setAttribute('aria-pressed','false')); b.setAttribute('aria-pressed','true'); clearInterval(timerInt); timerState.running=false; timerState.total=+b.dataset.min*60; timerState.left=timerState.total; upd(); }));
    $$('[data-mode]',root).forEach(b=>b.addEventListener('click',()=>{ $$('[data-mode]',root).forEach(x=>x.setAttribute('aria-pressed','false')); b.setAttribute('aria-pressed','true'); timerState.mode=b.dataset.mode; }));
    upd();
    if(st==='running') start();
  }
});

/* ===================== RUTINA (routine) ===================== */
const ROUTINE={
  Mañana:[{t:'Meditación 10 min',d:1},{t:'Desayuno saludable',d:1},{t:'Revisión de agenda',d:1}],
  Tarde:[{t:'Almuerzo',d:1},{t:'Respiración 5 min',d:1},{t:'Caminata',d:1},{t:'Registro de ánimo',d:0},{t:'Lectura 15 min',d:0}],
  Noche:[{t:'Bajar luces y pantallas',d:0},{t:'Preparar descanso',d:0}],
};
defScreen({
  id:'rutina', product:'suite', group:'Hábitos', title:'Checklist de rutina', icon:'check',
  desc:'Rutina diaria por franjas con progreso por bloque.',
  states:[{id:'default',label:'Con tareas'},{id:'add',label:'Agregar tarea'},{id:'done',label:'100% completa'},{id:'empty',label:'Sin tareas'}],
  navItems:[{id:'rutina',label:'Checklist de rutina'}],
  render(st){
    if(st==='empty'){
      return titlebar({icon:'check',title:'Checklist de rutina diaria',back:'home'}) + `<div class="screen"><div class="empty">
        <div class="ico">${svg(I.check,30)}</div><h3>Sin tareas asignadas</h3>
        <p>Cuando tu terapeuta asigne una rutina, tus tareas del día aparecerán organizadas por franja.</p></div></div>`;
    }
    const data=JSON.parse(JSON.stringify(ROUTINE));
    if(st==='done') Object.values(data).forEach(arr=>arr.forEach(x=>x.d=1));
    const blocks=Object.entries(data).map(([k,items],bi)=>{
      const done=items.filter(x=>x.d).length, pct=items.length?Math.round(done/items.length*100):0;
      const icon=k==='Mañana'?I.sun:k==='Tarde'?I.smile:I.moon;
      return `<div class="card pad" style="align-self:start;">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:14px;">
          <span style="color:var(--accent)">${svg(icon,18)}</span>
          <span class="h-serif" style="font-size:16px; flex:1;">${k}</span>
          <span style="font-size:12px; color:var(--ink-3); font-weight:600;">${done}/${items.length}</span>
          <span style="position:relative; display:grid; place-items:center;">${ringSVG(pct,{size:40,stroke:4,label:pct+'%'})}</span>
        </div>
        ${items.map((x,i)=>`<label class="rt-row" data-b="${bi}" data-i="${i}" style="display:flex; align-items:center; gap:11px; padding:8px 4px; cursor:pointer; border-radius:8px;">
          <span class="rt-cb ${x.d?'on':''}">${x.d?svg('<path d="M5 12l4 4 10-10"/>',14):''}</span>
          <span class="rt-t" style="font-size:13.5px; ${x.d?'text-decoration:line-through; color:var(--ink-3);':''}">${esc(x.t)}</span>
        </label>`).join('')}
        ${st==='add'&&k==='Mañana'?`<div style="display:flex; gap:8px; margin-top:8px;"><input class="input" id="rtNew" placeholder="Nueva tarea…" style="padding:9px 12px;"><button class="btn btn--primary" id="rtAdd" style="padding:9px 14px;">+</button></div>`:''}
      </div>`;
    }).join('');
    const allDone = st==='done';
    return titlebar({icon:'check',title:'Checklist de rutina diaria',back:'home'}) + `<div class="screen">
      <div class="card pad" id="rtSummary" style="display:flex; align-items:center; gap:18px; margin-bottom:18px; background:linear-gradient(135deg,var(--surface),var(--surface-2));">
        <span style="position:relative; display:grid; place-items:center;">${ringSVG(allDone?100:60,{size:64,stroke:7,label:(allDone?100:60)+'%'})}</span>
        <div><div class="eyebrow">Progreso del día</div>
        <div class="h-serif" id="rtSumTitle" style="font-size:19px; margin-top:4px;">${allDone?'10 de 10 tareas completadas':'6 de 10 tareas completadas'}</div>
        <div style="font-size:13px; color:var(--ink-2);">${allDone?'¡Día completo! Buen trabajo sosteniendo tu rutina.':'Vas por buen camino, seguí así.'}</div></div>
      </div>
      <div class="grid cols-3" style="align-items:start;">${blocks}</div>
    </div>`;
  },
  mount(root,st){
    root.querySelectorAll('.rt-row').forEach(row=>row.addEventListener('click',e=>{
      e.preventDefault();
      const cb=row.querySelector('.rt-cb'), t=row.querySelector('.rt-t');
      const on=cb.classList.toggle('on');
      cb.innerHTML = on?svg('<path d="M5 12l4 4 10-10"/>',14):'';
      t.style.textDecoration=on?'line-through':''; t.style.color=on?'var(--ink-3)':'';
      recalcRoutine(root);
    }));
    const add=$('#rtAdd',root);
    if(add) add.addEventListener('click',()=>{ const v=$('#rtNew',root).value.trim(); if(v){ toast('Tarea agregada: '+v); $('#rtNew',root).value=''; } });
  }
});
function recalcRoutine(root){
  let total=0,done=0;
  root.querySelectorAll('.rt-row').forEach(r=>{ total++; if(r.querySelector('.rt-cb').classList.contains('on'))done++; });
  const pct=total?Math.round(done/total*100):0;
  // update per-block rings
  const blocks={};
  root.querySelectorAll('.rt-row').forEach(r=>{ const b=r.dataset.b; blocks[b]=blocks[b]||{t:0,d:0}; blocks[b].t++; if(r.querySelector('.rt-cb').classList.contains('on'))blocks[b].d++; });
  // redraw summary
  const sum=$('#rtSummary',root);
  if(sum){ sum.querySelector('svg').outerHTML=ringSVG(pct,{size:64,stroke:7,label:pct+'%'});
    $('#rtSumTitle',root).textContent=`${done} de ${total} tareas completadas`; }
}
</script>

/* Local refit: invokes the EXISTING global fitScreen() on the current .window
   so the DBT screen re-measures after internal tab/filter changes. Does NOT
   touch fitScreen, fitHome, fitModal or FIT_MIN — just calls them. */
function dbtRefit(){
  const win=document.querySelector('.window');
  if(win && typeof fitScreen==='function'){
    try{ fitScreen(win); }catch(_){}
  }
  if(typeof fitModal==='function' && document.querySelector('.modal-bg.show')){
    try{ fitModal(); }catch(_){}
  }
}
function dbtWire(root){
  $$('#dbtTab button',root).forEach(b=>b.addEventListener('click',()=>{
    $$('#dbtTab button',root).forEach(x=>x.setAttribute('aria-pressed','false')); b.setAttribute('aria-pressed','true');
    const isNow=b.dataset.t==='now';
    $('#dbtBody',root).innerHTML = isNow?dbtNowBody():dbtLibBody('Todas'); dbtWire(root);
    // Sync stage title/desc with the active tab so the stage__top height
    // is consistent between direct navigation and internal tab clicks.
    // This prevents .window Y from shifting, which would cause sub-pixel
    // SVG anti-aliasing differences between the two paths.
    const tEl=$('#sTitle'), dEl=$('#sDesc');
    if(tEl) tEl.textContent = isNow?'Habilidades DBT · Ahora':'Habilidades DBT · Biblioteca';
    if(dEl) dEl.textContent = isNow?'Entrada por necesidad: elegí qué te pasa ahora y recibí una práctica guiada breve.':'Catálogo de las cuatro familias DBT, filtrable por categoría.';
    dbtRefit();
  }));
  const fil=$('#dbtFilter',root);
  if(fil) $$('button',fil).forEach(b=>b.addEventListener('click',()=>{ $('#dbtBody',root).innerHTML=dbtLibBody(b.dataset.f); dbtWire(root); dbtRefit(); }));
  root.querySelectorAll('[data-skill-id]').forEach(c=>c.addEventListener('click',e=>{ if(e.target.closest('.dbt-practice')||e.target.closest('.need-card')||e.target.closest('.dbt-card')) openDBTPractice(c.dataset.skillId); }));
}

function openDBTPractice(skillId){
  const practice = DBT_PRACTICES[skillId];
  if(!practice){ toast('Práctica DBT no encontrada'); return; }
  let step=0;
  const total=practice.steps.length;
  const modal=$('#modal');
  modal.classList.add('dbt-practice');
  const render=()=>{
    const s=practice.steps[step];
    modal.innerHTML=`
    <div class="screen" style="padding:18px 24px 16px;">
      <div class="eyebrow" style="text-align:center; color:var(--ink); letter-spacing:.12em; text-transform:none;">${esc(practice.title)} · ${esc(practice.familyFull)}</div>
      <div class="h-serif" style="text-align:center; font-size:12px; color:var(--ink-2); margin:12px 0 14px;">Paso ${step+1} de ${total}</div>
      <div style="display:flex; gap:11px; justify-content:center; margin-bottom:20px;">
        ${practice.steps.map((_,i)=>`<span style="width:9px;height:9px;border-radius:50%;background:${i===step?'var(--'+practice.familyClass+')':'var(--line)'}"></span>`).join('')}
      </div>
      <div class="card pad" style="min-height:148px; display:flex; flex-direction:column; justify-content:center; text-align:center;">
        <div class="h-serif" style="font-size:19px; margin-bottom:14px;">${esc(s.h)}</div>
        <p style="font-size:14px; color:var(--ink-2); line-height:1.45; max-width:42ch; margin:0 auto;">${esc(s.d)}</p>
      </div>
      <p style="font-size:11.5px; color:var(--rose); text-align:center; margin:14px auto 14px; max-width:48ch;">${esc(practice.disclaimer)}</p>
      <div style="display:flex; align-items:center; gap:10px;">
        <button class="btn btn--ghost" id="dbtExit" style="flex:1;">Salir</button>
        <button class="btn btn--ghost" id="dbtPrev" ${step===0?'disabled':''}>Anterior</button>
        <button class="btn btn--primary" id="dbtNext">${step===total-1?'Finalizar':'Siguiente'}</button>
      </div>
    </div>`;
    $('#dbtExit').onclick=closeModal;
    $('#dbtPrev').onclick=()=>{ if(step>0){step--; render(); requestAnimationFrame(fitModal);} };
    $('#dbtNext').onclick=()=>{ if(step<total-1){step++; render(); requestAnimationFrame(fitModal);} else {closeModal(); toast('Práctica completada · '+practice.title);} };
  };
  render(); $('#modalBg').classList.add('show'); requestAnimationFrame(fitModal);
}

/* tiny sparkline */
function sparkline(data,{w=78,h=30,color='var(--brand)'}={}){
  const min=Math.min(...data), max=Math.max(...data), span=(max-min)||1;
  const pts=data.map((v,i)=>{
    const x=(i/(data.length-1))*(w-4)+2;
    const y=h-2-((v-min)/span)*(h-8);
    return [x,y];
  });
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const last=pts[pts.length-1];
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" fill="none" style="overflow:visible">
    <path d="${d}" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.6" fill="${color}"/>
  </svg>`;
}

];
const TEXT_MODULES = ['Todos los módulos', ...[...new Set(GLOBAL_TEXTS.map(t=>t[0]))]];
let TG_FILTER='Todos los módulos', TG_SEARCH='', TG_DIRTY=new Set();

defScreen({
  id:'textos', product:'hub', group:'Configuración', title:'Textos globales', icon:'text',
  desc:'Editor de los textos visibles en la Suite, con buscador, filtro por módulo y contador de caracteres.',
  navItems:[{id:'textos',label:'Textos globales de Suite',tag:'145'}],
  render(){
    return `${titlebar({icon:'text',title:'Textos globales de Suite'})}
    <div class="screen tg-body">
      <div class="tg-top">
        <h2 class="h-serif" style="font-size:19px; margin:0; white-space:nowrap;">Textos globales</h2>
        <div class="nav__search tg-search" style="margin:0; flex:1; min-width:160px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="tgSearch" type="text" placeholder="Buscar textos…" value="${esc(TG_SEARCH)}"/>
        </div>
        <select class="input" id="tgFilter" style="width:auto;">
          ${TEXT_MODULES.map(m=>`<option ${m===TG_FILTER?'selected':''}>${esc(m)}</option>`).join('')}
        </select>
        <span class="badge brand" style="font-weight:600;">145 textos</span>
      </div>
      <div class="tg-list" id="tgList"></div>
      <div class="tg-foot">
        <span id="tgStatus" style="font-size:12.5px; color:var(--ink-3);">Sin cambios</span>
        <div style="flex:1"></div>
        <button class="btn btn--ghost" id="tgResetAll">Restaurar todos</button>
        <button class="btn btn--primary" id="tgSave" disabled>Guardar cambios</button>
      </div>
    </div>`;
  },
  mount(root){
    const listEl=$('#tgList',root), status=$('#tgStatus',root), save=$('#tgSave',root);
    function refreshStatus(){
      const n=TG_DIRTY.size;
      status.textContent = n? `${n} cambio${n===1?'':'s'} sin guardar` : 'Sin cambios';
      save.disabled = n===0;
    }
    function paint(){
      const f=TG_SEARCH.trim().toLowerCase();
      const rows=GLOBAL_TEXTS.filter(t=>
        (TG_FILTER==='Todos los módulos'||t[0]===TG_FILTER) &&
        (!f || (t[0]+' '+t[1]+' '+t[2]).toLowerCase().includes(f))
      );
      if(!rows.length){ listEl.innerHTML=`<div class="empty" style="padding:40px;"><div class="ico">${svg(I.text,28)}</div><h3>Sin resultados</h3><p>Probá con otro término o módulo.</p></div>`; return; }
      listEl.innerHTML=rows.map(t=>{
        const key=t[0]+'·'+t[1];
        return `<div class="tg-row" data-key="${esc(key)}">
          <div class="tg-label">
            <div class="tg-mod">${esc(t[0])}</div>
            <div class="tg-name">${esc(t[1])}</div>
          </div>
          <input class="input tg-input" data-max="${t[3]}" maxlength="${t[3]}" value="${esc(t[2])}"/>
          <div class="tg-meta">
            <span class="tg-count">${t[2].length} / ${t[3]}</span>
            <button class="btn btn--ghost tg-restore" data-orig="${esc(t[2])}" style="padding:7px 12px; font-size:12px;">Restaurar</button>
          </div>
        </div>`;
      }).join('');
      $$('.tg-input',listEl).forEach(inp=>{
        const row=inp.closest('.tg-row'), key=row.dataset.key, orig=$('.tg-restore',row).dataset.orig, count=$('.tg-count',row);
        inp.addEventListener('input',()=>{
          count.textContent=`${inp.value.length} / ${inp.dataset.max}`;
          if(inp.value!==orig) TG_DIRTY.add(key); else TG_DIRTY.delete(key);
          row.classList.toggle('dirty', inp.value!==orig);
          refreshStatus();
        });
        $('.tg-restore',row).addEventListener('click',()=>{
          inp.value=orig; count.textContent=`${orig.length} / ${inp.dataset.max}`;
          TG_DIRTY.delete(key); row.classList.remove('dirty'); refreshStatus();
        });
      });
    }
    $('#tgSearch',root).addEventListener('input',e=>{ TG_SEARCH=e.target.value; paint(); });
    $('#tgFilter',root).addEventListener('change',e=>{ TG_FILTER=e.target.value; paint(); });
    $('#tgResetAll',root).addEventListener('click',()=>{ TG_DIRTY.clear(); paint(); refreshStatus(); toast('Textos restaurados'); });
    save.addEventListener('click',()=>{ TG_DIRTY.clear(); paint(); refreshStatus(); toast('Cambios guardados'); });
    paint(); refreshStatus();
  }
});

/* ============================================================================
   BOOT
   ============================================================================ */
setTheme('light');
document.documentElement.dataset.product='suite';
buildNav();
go('home');

/* Re-fit on viewport resize (e.g. devtools, zoom) and once webfonts are ready
   so measurements reflect the final typography. */
window.addEventListener('resize', () => {
  const win=document.querySelector('.window');
  if(win) fitScreen(win);
  if($('#modalBg').classList.contains('show')) fitModal();
});
if(document.fonts && document.fonts.ready){
  document.fonts.ready.then(() => {
    const win=document.querySelector('.window');
    if(win) fitScreen(win);
    if($('#modalBg').classList.contains('show')) fitModal();
  });
}
</script>
</body>
</html>
