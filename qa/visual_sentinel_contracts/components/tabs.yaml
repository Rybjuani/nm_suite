# Contratos de componentes: TABS.
# Reglas por PROPORCION (peso visual respecto a la ventana), no por pantalla.
contracts:
  - id: no_oversized_secondary_tabs
    severity: P2
    description: >
      Tabs con peso visual excesivo (alto > 18% de la ventana) rompen la
      densidad del layout. Regla por proporcion, aplica a cualquier pantalla.
    check: oversized_secondary_tabs
    params:
      max_tab_to_window_height_ratio: 0.18

  - id: no_long_tab_labels
    severity: P2
    description: >
      Tabs con labels largos (> 36 chars) que rompen densidad.
      Limite ampliado: el Hub usa nombres completos de modulos Suite (hasta 34 chars).
    check: long_tab_labels
    params:
      max_label_chars: 36

  - id: tabs_out_of_viewport
    severity: P1
    description: Ningun contenedor de tabs visible puede quedar fuera del viewport.
    check: out_of_viewport
