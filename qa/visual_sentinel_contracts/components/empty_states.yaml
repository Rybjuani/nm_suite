# Contratos de componentes: EMPTY STATES.
contracts:
  - id: empty_state_not_blank
    severity: P0
    description: >
      Un empty state debe renderizar contenido (icono + copy + CTA). Si la
      captura sale blank/flat, el empty state no se renderizo de verdad.
    check: blank_or_flat

  - id: empty_state_not_duplicate_of_parent
    severity: P1
    description: >
      Un empty state identico a su pantalla padre indica que no se alcanzo el
      estado vacio (fallback a la vista poblada).
    check: duplicate_suspect
