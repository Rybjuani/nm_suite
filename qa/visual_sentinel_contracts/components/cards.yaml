# Contratos de componentes: CARDS / superficies de contenido.
contracts:
  - id: cards_not_blank
    severity: P0
    description: >
      Si la pantalla sale blank/flat, la card tampoco aporta evidencia.
    check: blank_or_flat

  - id: card_not_duplicate
    severity: P1
    description: >
      Una card identica a otra pantalla distinta indica fallback.
    check: duplicate_suspect
