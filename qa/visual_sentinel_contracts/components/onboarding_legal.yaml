# Contratos de componentes: ONBOARDING / LEGAL.
# Reglas ESTRUCTURALES genericas (no nombran pantallas): aplican a cualquier
# pantalla con checkbox dentro de scroll o scrollbar interna con overflow, que
# son los patrones de riesgo tipico de consentimientos/onboarding.
contracts:
  - id: legal_no_checkbox_inside_scroll
    severity: P1
    description: >
      Checkbox/toggle dentro de un QScrollArea: el consentimiento debe quedar
      fijo y visible, no perdido dentro de un area desplazable.
    check: checkbox_in_scroll_area

  - id: legal_no_internal_scrollbar_overflow
    severity: P1
    description: >
      Scrollbar interna con rango > pageStep: posible truncamiento de terminos
      que obliga a desplazar para verlos.
    check: dialog_internal_scrollbar
