name: Visual Closure Replay

on:
  pull_request:
    paths:
      - "app/**"
      - "hub/**"
      - "shared/**"
      - "assets/**"
      - "qa/**"
      - "tools/qa/**"
      - "tests/**"
      - "docs/closure_evidence/**"
      - "VISUAL_REPAIR_HANDOFF.md"
      - "WORKER_VISUAL_QA_FLOW.md"
      - ".gitattributes"
      - ".github/CODEOWNERS"
      - ".github/workflows/**"
  push:
    paths:
      - "app/**"
      - "hub/**"
      - "shared/**"
      - "assets/**"
      - "qa/**"
      - "tools/qa/**"
      - "tests/**"
      - "docs/closure_evidence/**"
      - "VISUAL_REPAIR_HANDOFF.md"
      - "WORKER_VISUAL_QA_FLOW.md"
      - ".gitattributes"
      - ".github/CODEOWNERS"
      - ".github/workflows/**"

permissions:
  contents: read
  issues: read

jobs:
  structural-precheck:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      NM_VISUAL_APPROVAL_REPO: ${{ github.repository }}
      NM_VISUAL_APPROVAL_OWNER: Rybjuani
      NM_VISUAL_APPROVAL_ISSUE: ${{ vars.NM_VISUAL_APPROVAL_ISSUE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run anti-fraud scans
        run: python qa/anti_fraud_scan.py --mode all

      - name: Resolve audited base
        id: base
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_commit="$(git merge-base "origin/${{ github.base_ref }}" HEAD)"
          else
            before="${{ github.event.before }}"
            zeros="0000000000000000000000000000000000000000"
            if [ -z "$before" ] || [ "$before" = "$zeros" ]; then
              base_commit="$(git merge-base origin/main HEAD)"
            elif git cat-file -e "${before}^{commit}" 2>/dev/null; then
              base_commit="$before"
            else
              echo "push base ${before} is unreachable; refusing unknown range" >&2
              exit 1
            fi
          fi
          test -n "$base_commit"
          if ! git merge-base --is-ancestor "$base_commit" HEAD; then
            echo "audited base is not an ancestor of HEAD" >&2
            exit 1
          fi
          echo "base=$base_commit" >> "$GITHUB_OUTPUT"

      - name: Validate structural closure evidence
        run: >-
          python qa/replay_visual_closure.py
          --structural-precheck
          --base "${{ steps.base.outputs.base }}"

  pytest-stdlib:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest only
        run: python -m pip install --disable-pip-version-check pytest==9.0.3

      - name: Run explicit stdlib harness tests
        run: |
          python -m pytest -q \
            tests/test_hash_utils.py \
            tests/test_closure_policy.py \
            tests/test_approval_verifier.py \
            tests/test_state_probes.py \
            tests/test_surface_scope.py \
            tests/test_target_scope.py \
            tests/test_handoff_integrity.py \
            tests/test_replay_visual_closure.py \
            tests/test_vas_gate.py \
            tests/test_visual_closure_governance.py
